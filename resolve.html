<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://tournyx.in/favicon.ico" sizes="any">
    <link rel="icon" href="https://tournyx.in/favicon.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="https://tournyx.in/apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Resolve Match - Tournyx</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- GLOBAL VARIABLES --- */
        :root {
            --primary-bg: #05020c;
            --secondary-bg: #0a0514;
            --card-bg: rgba(20, 10, 35, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-cyan: #00f2ff;
            --accent-purple: #bd00ff;
            --accent-orange: #ff9900;
            --accent-green: #00ff7f;
            --accent-danger: #ff4d4d;
            --accent-gradient: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            --font-head: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        .theme-vip {
            --accent-cyan: #FFD700;
            --accent-purple: #FFA500;
            --accent-gradient: linear-gradient(135deg, #FFE87C, #D4AF37, #FF8C00);
            --card-border: rgba(212, 175, 55, 0.3);
        }

        * { -ms-overflow-style: none !important; scrollbar-width: none !important; margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; background: transparent !important; }

        /* ABSOLUTE DESKTOP/MOBILE RESET */
        body {
            background-color: var(--primary-bg); 
            color: white; 
            font-family: var(--font-body);
            padding-bottom: calc(140px + env(safe-area-inset-bottom, 0px)); 
            overflow-x: hidden;
            padding-top: calc(85px + env(safe-area-inset-top, 0px)) !important; 
            margin: 0 !important;
            width: 100vw;
            min-height: 100vh;
            display: block;
        }

        .main-container { 
            max-width: 800px; 
            margin: 0 auto !important; 
            padding: 0 20px; 
            width: 100%; 
            display: block;
        }

        /* BULLETPROOF HEADER ALIGNMENT */
        .top-header { 
            position: fixed; 
            top: 0 !important; 
            left: 0; 
            width: 100%; 
            height: calc(65px + env(safe-area-inset-top, 0px)); 
            padding: env(safe-area-inset-top, 0px) 20px 0 20px; 
            background: rgba(5, 2, 12, 0.95); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            box-sizing: border-box;
            margin: 0 !important;
        }
        .back-btn { color: white; font-size: 1.3rem; cursor: pointer; text-decoration: none; padding: 10px 10px 10px 0; transition: 0.3s; display: flex; align-items: center;}
        .back-btn:active { transform: translateX(-5px); color: var(--accent-cyan); }
        .theme-vip .back-btn:active { color: #FFD700; }
        .page-title { font-family: var(--font-head); font-size: 1.15rem; font-weight: bold; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 1px; margin: 0; }

        /* WALLET BAR */
        .wallet-bar { background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); backdrop-filter: blur(10px); transition: all 0.4s ease; animation: fadeInDown 0.5s ease; }
        .wallet-stat { text-align: center; flex: 1; }
        .wallet-stat h5 { font-family: var(--font-head); font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 3px; }
        .wallet-stat span { font-family: var(--font-head); font-size: 1.2rem; font-weight: bold; color: white; }
        .wallet-divider { width: 1px; height: 30px; background: rgba(255,255,255,0.1); }

        .section-title { font-family: var(--font-head); font-size: 1.2rem; color: white; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--card-border); padding-bottom: 10px;}

        /* TOURNAMENT LIST */
        .tourney-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 18px; margin-bottom: 15px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); animation: fadeInUp 0.5s ease backwards; }
        .tourney-card:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.2); }
        .tourney-card:active { transform: scale(0.97); border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        .theme-vip .tourney-card:active { border-color: #FFD700; box-shadow: 0 0 15px rgba(255,215,0,0.2); }
        .t-info { flex: 1; min-width: 0; }
        .t-info h4 { font-family: var(--font-head); font-size: 1.1rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white;}
        .t-info p { font-size: 0.85rem; color: #888; }
        .t-arrow { color: var(--accent-cyan); font-size: 1.2rem; margin-left: 10px; flex-shrink: 0; transition: 0.3s; }
        .theme-vip .t-arrow { color: #FFD700; }
        .tourney-card:hover .t-arrow { transform: translateX(3px); }

        /* RESOLUTION VIEW */
        #resolutionView { display: none; animation: fadeIn 0.4s ease; }
        
        .prize-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .prize-tag { background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        .prize-tag.p1 { color: #FFD700; border-color: rgba(255,215,0,0.3); background: rgba(255,215,0,0.05); box-shadow: 0 0 10px rgba(255,215,0,0.1); }
        .prize-tag.p2 { color: #C0C0C0; border-color: rgba(192,192,192,0.3); background: rgba(192,192,192,0.05); box-shadow: 0 0 10px rgba(192,192,192,0.1); }
        .prize-tag.p3 { color: #cd7f32; border-color: rgba(205,127,50,0.3); background: rgba(205,127,50,0.05); box-shadow: 0 0 10px rgba(205,127,50,0.1); }

        .team-card { background: rgba(0,0,0,0.4); border: 1px solid var(--card-border); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; animation: fadeInUp 0.4s ease backwards;}
        .team-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .team-name { font-family: var(--font-head); font-weight: bold; font-size: 1.05rem; color: white; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .action-btn { background: var(--accent-gradient); border: none; padding: 8px 15px; border-radius: 8px; color: white; font-family: var(--font-head); font-weight: bold; font-size: 0.8rem; cursor: pointer; transition: all 0.3s; text-transform: uppercase; flex-shrink: 0; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 15px rgba(0,242,255,0.2);}
        .action-btn:active { transform: scale(0.92); box-shadow: 0 0 5px rgba(0,242,255,0.5); }
        
        .rank-badge { display: none; font-family: var(--font-head); font-weight: 900; font-size: 0.85rem; padding: 5px 12px; border-radius: 6px; text-transform: uppercase; transition: 0.3s; white-space: nowrap;}
        .team-card.ranked-1 { border-color: #FFD700; background: rgba(255,215,0,0.05); transform: scale(1.02); }
        .team-card.ranked-1 .rank-badge { display: inline-block; background: #FFD700; color: black; box-shadow: 0 0 10px rgba(255,215,0,0.5); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .team-card.ranked-2 { border-color: #C0C0C0; background: rgba(192,192,192,0.05); }
        .team-card.ranked-2 .rank-badge { display: inline-block; background: #C0C0C0; color: black; box-shadow: 0 0 10px rgba(192,192,192,0.5); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .team-card.ranked-3 { border-color: #cd7f32; background: rgba(205,127,50,0.05); }
        .team-card.ranked-3 .rank-badge { display: inline-block; background: #cd7f32; color: black; box-shadow: 0 0 10px rgba(205,127,50,0.5); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* CUSTOM PAYOUT ALLOCATOR */
        .points-allocator { display: none; width: 100%; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; align-items: center; gap: 10px; flex-wrap: wrap; animation: fadeInDown 0.3s ease; }
        .team-card.points-mode .points-allocator { display: flex; }
        .points-allocator input { flex: 1; min-width: 100px; background: rgba(0,0,0,0.5); border: 1px solid var(--card-border); padding: 10px 12px; border-radius: 8px; color: white; font-family: var(--font-head); font-size: 0.95rem; outline: none; transition: 0.3s; }
        .points-allocator input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        .theme-vip .points-allocator input:focus { border-color: #FFD700; box-shadow: 0 0 10px rgba(255,215,0,0.2); }
        .pts-save-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; flex-shrink: 0; flex-basis: auto; }
        .pts-save-btn:active { background: var(--accent-cyan); border-color: var(--accent-cyan); color: black; transform: scale(0.92); }
        .theme-vip .pts-save-btn:active { background: #FFD700; border-color: #FFD700; }

        /* FLOATING ACTION BAR */
        .bottom-summary-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px calc(15px + env(safe-area-inset-bottom, 0px)); background: rgba(5,2,12,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--accent-cyan); z-index: 1000; box-shadow: 0 -10px 40px rgba(0,242,255,0.1); display: none; flex-direction: column; align-items: center; gap: 10px; }
        .theme-vip .bottom-summary-bar { border-top-color: #FFD700; box-shadow: 0 -10px 40px rgba(255,215,0,0.1); }
        .bottom-summary-bar.active { display: flex; animation: slideInUp 0.4s ease; }
        
        .totals-text { font-family: var(--font-head); font-size: 0.9rem; color: #aaa; text-align: center; width: 100%; display: flex; justify-content: space-between; max-width: 800px;}
        .totals-text b { color: white; font-size: 1rem; transition: 0.3s; }
        .totals-text .err { color: var(--accent-danger) !important; text-shadow: 0 0 5px rgba(255,77,77,0.5); }

        .submit-resolution-btn { width: 100%; max-width: 800px; padding: 16px; background: var(--accent-gradient); border: none; border-radius: 12px; color: white; font-family: var(--font-head); font-size: 1.1rem; font-weight: bold; text-transform: uppercase; cursor: pointer; box-shadow: 0 5px 20px rgba(0,242,255,0.3); transition: 0.3s; letter-spacing: 1px; }
        .submit-resolution-btn:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(0,242,255,0.3); }
        .submit-resolution-btn:disabled { background: rgba(255,255,255,0.1); color: #888; box-shadow: none; cursor: not-allowed; transform: none; }

        #customToast { visibility: hidden; min-width: 250px; background: rgba(0,242,255,0.95); backdrop-filter: blur(10px); color: #000; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 9999; left: 50%; bottom: -50px; transform: translateX(-50%); font-family: var(--font-head); font-weight: bold; box-shadow: 0 8px 30px rgba(0,242,255,0.5); opacity: 0; transition: opacity 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .theme-vip #customToast { background: rgba(255,215,0,0.95); box-shadow: 0 8px 30px rgba(255,215,0,0.5); }
        #customToast.show { visibility: visible; opacity: 1; bottom: 100px; }

        .loading-state { text-align: center; padding: 40px 20px; color: #888; font-size: 0.95rem; }
        .loading-state i { font-size: 2rem; color: var(--accent-cyan); margin-bottom: 15px; display: block; }
        .theme-vip .loading-state i { color: #FFD700; }

        /* Keyframes */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }

    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <header class="top-header">
        <a href="profile.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h3 class="page-title">Match Resolution</h3>
        <div style="width: 24px;"></div> </header>

    <div class="main-container">
        
        <div class="wallet-bar">
            <div class="wallet-stat">
                <h5>My Earnings</h5>
                <span style="color: var(--accent-cyan);">₹<span id="orgEarningsBal">0</span></span>
            </div>
            <div class="wallet-divider"></div>
            <div class="wallet-stat">
                <h5>My Points</h5>
                <span style="color: var(--accent-orange);"><span id="orgPointsBal">0</span> PTS</span>
            </div>
        </div>

        <div id="tourneyListSection">
            <div class="section-title"><i class="fa-solid fa-list-check"></i> Select Match to Resolve</div>
            <div id="tourneyListContainer">
                <div class="loading-state"><i class="fa-solid fa-spinner fa-spin"></i> Fetching active tournaments...</div>
            </div>
        </div>

        <div id="resolutionView">
            <div class="section-title" style="border:none; margin-bottom: 5px;">
                <i class="fa-solid fa-trophy" style="color: #FFD700;"></i> <span id="resMatchTitle" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Tournament Name</span>
            </div>
            
            <div class="prize-legend" id="prizeLegendBox"></div>

            <p style="font-size: 0.85rem; color: #aaa; margin-bottom: 15px; line-height: 1.4;">
                Tap the crown to assign podium prizes. Tap 'Undo' to reverse. For other players, use the custom payout.
            </p>

            <div id="teamsContainer">
                <div class="loading-state"><i class="fa-solid fa-spinner fa-spin"></i> Loading registered teams...</div>
            </div>
        </div>
    </div>

    <div class="bottom-summary-bar" id="submitBar">
        <div class="totals-text">
            <span>Deducting:</span>
            <span><b id="totCash" style="color:var(--accent-cyan);">₹0</b> &nbsp;|&nbsp; <b id="totPts" style="color:var(--accent-orange);">0 PTS</b></span>
        </div>
        <button class="submit-resolution-btn" id="btnFinalize" onclick="submitResolution()">Finalize Payouts</button>
    </div>

    <div id="customToast">Notification</div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyqqTpgaflxKJ9xH0jq7mJ_jLzcoNhas3gNo0h5gvoa_6r5Ae9NFxJAJp7ZoYNnMRKl/exec'; 
        let userData = JSON.parse(localStorage.getItem('tournyx_user')) || {};
        
        let activeMatchId = "";
        let allPrizes = []; 
        
        // Editable Tracking Maps
        let rankAssignments = {}; // teamName -> rank (1, 2, 3)
        let cashAssignments = {}; // teamName -> amount (for podium cash)
        let customCashAssignments = {}; // teamName -> amount (for custom cash)
        let pointAssignments = {}; // teamName -> points

        function triggerHaptic() { if(navigator.vibrate) navigator.vibrate(40); }
        function showToast(msg, isError = false) {
            const t = document.getElementById('customToast');
            t.innerText = msg; t.className = "show";
            t.style.backgroundColor = isError ? "var(--accent-danger)" : (document.body.classList.contains('theme-vip') ? "#FFD700" : "var(--accent-cyan)");
            t.style.color = isError ? "white" : "#000";
            setTimeout(() => t.className = "", 3000);
        }

        function checkVIP() {
            if (String(userData.is_premium).toLowerCase() === 'true') {
                document.body.classList.add('theme-vip');
            }
        }

        // --- BACKGROUND ANIMATION ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let pArray = [];
        class P { constructor(){ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.s=Math.random()*2; this.c=Math.random()>0.5?'#bd00ff':'#00f2ff'; } u(){ this.y-=0.5; if(this.y<0)this.y=canvas.height; } d(){ ctx.fillStyle=this.c; ctx.globalAlpha=0.3; ctx.beginPath(); ctx.arc(Math.floor(this.x),Math.floor(this.y),this.s,0,Math.PI*2); ctx.fill(); } }
        for(let i=0; i<30; i++) pArray.push(new P());
        function anim(){ ctx.clearRect(0,0,canvas.width,canvas.height); pArray.forEach(p=>{p.u();p.d()}); requestAnimationFrame(anim); }
        anim();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        document.addEventListener("DOMContentLoaded", () => {
            if (!userData.email || userData.role !== 'organizer') {
                window.location.href = 'profile.html';
                return;
            }
            checkVIP();
            
            // Initial render
            document.getElementById('orgEarningsBal').innerText = (parseInt(userData.earnings) || 0).toLocaleString();
            document.getElementById('orgPointsBal').innerText = (parseInt(userData.points) || 0).toLocaleString();
            if(document.body.classList.contains('theme-vip')) {
                document.querySelector('.wallet-stat span').style.color = "#FFD700";
            }
            
            fetchOrganizerTournaments();
        });

        // --- STEP 1: FETCH TOURNAMENTS ---
        function fetchOrganizerTournaments() {
            const container = document.getElementById('tourneyListContainer');
            fetch(API_URL, {
                method: 'POST', headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'get_tournaments' })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success" && data.data) {
                    let myEmailStr = String(userData.email).toLowerCase().trim();
                    let myEvents = data.data.filter(t => {
                        let dbStatus = String(t.db_status || t.status || "").toLowerCase();
                        if (dbStatus === 'completed' || dbStatus === 'deleted' || dbStatus === 'cancelled') return false;
                        let backendEmail = String(t.org_email || t.organizer_email || t.email || "").toLowerCase().trim();
                        return backendEmail === myEmailStr;
                    });

                    container.innerHTML = "";
                    if(myEvents.length === 0) {
                        container.innerHTML = "<div style='color:#888; text-align:center; padding:20px;'><i class='fa-solid fa-ghost' style='font-size:2rem; margin-bottom:10px;'></i><br>No active tournaments to resolve.</div>";
                    } else {
                        myEvents.forEach((t, index) => {
                            let matchId = t.id || t.match_id;
                            let rawTitle = String(t.title || "Untitled");
                            let animDelay = index * 0.1;
                            
                            // Extract prizes to pass them forward safely
                            let pObj = {1:0, 2:0, 3:0};
                            try {
                                let pData = t.prize_json || t.prize_distribution || "";
                                if(pData.startsWith("{")) {
                                    let parsed = JSON.parse(pData);
                                    if(parsed["1"]) pObj[1] = parseInt(String(parsed["1"]).replace(/[^0-9]/g, ''))||0;
                                    if(parsed["2"]) pObj[2] = parseInt(String(parsed["2"]).replace(/[^0-9]/g, ''))||0;
                                    if(parsed["3"]) pObj[3] = parseInt(String(parsed["3"]).replace(/[^0-9]/g, ''))||0;
                                } else {
                                    if(t.prize1) pObj[1] = parseInt(String(t.prize1).replace(/[^0-9]/g, ''))||0;
                                    if(t.prize2) pObj[2] = parseInt(String(t.prize2).replace(/[^0-9]/g, ''))||0;
                                    if(t.prize3) pObj[3] = parseInt(String(t.prize3).replace(/[^0-9]/g, ''))||0;
                                    if(pObj[1]===0 && t.prize_pool) pObj[1] = parseInt(String(t.prize_pool).replace(/[^0-9]/g, ''))||0;
                                }
                            } catch(e) {}
                            
                            // FIX: Safely encode text and JSON to prevent HTML freezing on click
                            let safeTitleEnc = encodeURIComponent(rawTitle);
                            let safePrizeEnc = encodeURIComponent(JSON.stringify(pObj));

                            container.innerHTML += `
                                <div class="tourney-card" style="animation-delay: ${animDelay}s" onclick="openResolutionView('${matchId}', '${safeTitleEnc}', '${safePrizeEnc}')">
                                    <div class="t-info">
                                        <h4>${rawTitle.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</h4>
                                        <p>Date: ${t.match_period || t.date || 'TBD'} • Status: Live</p>
                                    </div>
                                    <i class="fa-solid fa-chevron-right t-arrow"></i>
                                </div>
                            `;
                        });
                    }
                } else {
                    container.innerHTML = "<div style='color:#ff4d4d; text-align:center;'>Failed to load tournaments.</div>";
                }
            }).catch(() => {
                container.innerHTML = "<div style='color:#ff4d4d; text-align:center;'>Network error.</div>";
            });
        }

        // --- STEP 2: OPEN RESOLVE VIEW FOR A MATCH ---
        function openResolutionView(matchId, titleEnc, prizeJsonStrEncoded) {
            triggerHaptic();
            activeMatchId = matchId;
            document.getElementById('tourneyListSection').style.display = 'none';
            document.getElementById('resolutionView').style.display = 'block';
            document.getElementById('submitBar').classList.add('active');
            
            document.getElementById('resMatchTitle').innerText = decodeURIComponent(titleEnc);

            // Setup Prizes Array from decoded string
            allPrizes = [];
            rankAssignments = {};
            cashAssignments = {};
            customCashAssignments = {};
            pointAssignments = {};
            updateTotalsUI();

            let pObj = JSON.parse(decodeURIComponent(prizeJsonStrEncoded));
            let legendHtml = "";
            if(pObj[1] > 0) { allPrizes.push({rank: 1, amount: pObj[1]}); legendHtml += `<div class="prize-tag p1"><i class="fa-solid fa-trophy"></i> 1st: ₹${pObj[1]}</div>`; }
            if(pObj[2] > 0) { allPrizes.push({rank: 2, amount: pObj[2]}); legendHtml += `<div class="prize-tag p2"><i class="fa-solid fa-medal"></i> 2nd: ₹${pObj[2]}</div>`; }
            if(pObj[3] > 0) { allPrizes.push({rank: 3, amount: pObj[3]}); legendHtml += `<div class="prize-tag p3"><i class="fa-solid fa-award"></i> 3rd: ₹${pObj[3]}</div>`; }
            
            if(allPrizes.length === 0) {
                allPrizes.push({rank: 1, amount: 0});
                legendHtml = `<div class="prize-tag p1"><i class="fa-solid fa-trophy"></i> Winner Takes All</div>`;
            }
            document.getElementById('prizeLegendBox').innerHTML = legendHtml;

            loadTeams(matchId);
        }

        function loadTeams(matchId) {
            const container = document.getElementById('teamsContainer');
            container.innerHTML = `<div class="loading-state"><i class="fa-solid fa-spinner fa-spin"></i> Loading registered teams...</div>`;

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ action: 'get_all_matches' })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success" && data.data) {
                    let matchRegs = [];
                    try {
                        let parsedData = typeof data.data === 'string' ? JSON.parse(data.data) : data.data;
                        matchRegs = parsedData.filter(m => String(m.match_id) === String(matchId));
                    } catch(e) {
                        matchRegs = data.data.filter(m => String(m.match_id) === String(matchId));
                    }
                    
                    container.innerHTML = "";
                    if(matchRegs.length > 0) {
                        matchRegs.forEach((team, index) => {
                            let rawName = team.clan || team.username || team.user_email || "Unknown Player";
                            let teamName = rawName;
                            let animDelay = index * 0.1;
                            
                            // EXTREME JSON STRIPPER
                            try {
                                if (typeof rawName === 'string' && (rawName.trim().startsWith('{') || rawName.includes('username'))) {
                                    let cleanJson = rawName.replace(/'/g, '"');
                                    let p = JSON.parse(cleanJson);
                                    teamName = p.clan || p.clan_name || p.username || p.ign || rawName;
                                }
                            } catch(e) {
                                let match = String(rawName).match(/"(?:clan|clan_name|username|ign)"\s*:\s*"([^"]+)"/i);
                                if (match) teamName = match[1];
                            }
                            
                            let cleanId = String(teamName).replace(/[^a-zA-Z0-9]/g, ''); 
                            let safeTeamNameForJs = String(teamName).replace(/"/g, "&quot;").replace(/'/g, "\\'");
                            
                            container.innerHTML += `
                            <div class="team-card" id="card-${cleanId}" data-teamname="${safeTeamNameForJs}" style="animation-delay: ${animDelay}s">
                                <div class="team-top">
                                    <div class="team-name">${teamName}</div>
                                    <div class="rank-badge" id="badge-${cleanId}"></div>
                                    <button class="action-btn" id="btn-${cleanId}" onclick="handleTeamAction('${cleanId}', '${safeTeamNameForJs}')">
                                        <i class="fa-solid fa-crown"></i> Assign
                                    </button>
                                </div>
                                <div class="points-allocator" id="pts-box-${cleanId}">
                                    <input type="tel" inputmode="numeric" id="inp-cash-${cleanId}" placeholder="₹ Cash">
                                    <input type="tel" inputmode="numeric" id="inp-pts-${cleanId}" placeholder="PTS">
                                    <button class="pts-save-btn" onclick="saveCustomPayout('${cleanId}', '${safeTeamNameForJs}')"><i class="fa-solid fa-check"></i></button>
                                </div>
                            </div>`;
                        });
                        updateActionButtons();
                    } else {
                        container.innerHTML = "<div style='color:#888; text-align:center; padding: 20px;'>No teams registered for this match.</div>";
                        document.getElementById('btnFinalize').disabled = true;
                    }
                } else {
                    container.innerHTML = "<div style='color:#ff4d4d; text-align:center;'>Error loading teams.</div>";
                }
            }).catch(() => {
                container.innerHTML = "<div style='color:#ff4d4d; text-align:center;'>Network error while loading.</div>";
            });
        }

        // --- STEP 3: INTERACTIVE PODIUM ASSIGNMENT ---
        function getRankSuffix(i) {
            let j = i % 10, k = i % 100;
            if (j == 1 && k != 11) return "st";
            if (j == 2 && k != 12) return "nd";
            if (j == 3 && k != 13) return "rd";
            return "th";
        }

        function getNextAvailablePrize() {
            for (let i = 0; i < allPrizes.length; i++) {
                let p = allPrizes[i];
                let isAssigned = Object.values(rankAssignments).includes(p.rank);
                if (!isAssigned) return p;
            }
            return null; // All podiums filled
        }

        function updateActionButtons() {
            let nextPrize = getNextAvailablePrize();
            
            document.querySelectorAll('.team-card').forEach(card => {
                let teamName = card.dataset.teamname;
                let btn = card.querySelector('.action-btn');
                let ptsBox = card.querySelector('.points-allocator');
                let badge = card.querySelector('.rank-badge');
                
                // Clear state
                card.classList.remove('ranked-1', 'ranked-2', 'ranked-3', 'has-points');

                if (rankAssignments[teamName]) {
                    // HAS PODIUM PRIZE
                    let rank = rankAssignments[teamName];
                    let amt = cashAssignments[teamName] || 0;
                    
                    card.classList.add(`ranked-${rank}`);
                    badge.style.display = 'inline-block';
                    badge.innerText = `${rank}${getRankSuffix(rank)} (₹${amt})`;
                    
                    btn.style.display = 'flex';
                    btn.innerHTML = `<i class="fa-solid fa-rotate-left"></i> Undo`;
                    btn.style.background = 'rgba(255,77,77,0.2)';
                    btn.style.color = 'var(--accent-danger)';
                    ptsBox.style.display = 'none';

                } else if (customCashAssignments[teamName] || pointAssignments[teamName]) {
                    // HAS CUSTOM PAYOUT
                    let c = customCashAssignments[teamName] || 0;
                    let p = pointAssignments[teamName] || 0;
                    
                    let bText = [];
                    if (c > 0) bText.push(`₹${c}`);
                    if (p > 0) bText.push(`${p} PTS`);
                    
                    card.classList.add('has-points');
                    badge.style.display = 'inline-block';
                    badge.innerText = "+" + bText.join(' | ');
                    badge.style.background = 'rgba(255,255,255,0.1)';
                    badge.style.color = document.body.classList.contains('theme-vip') ? '#FFD700' : 'var(--accent-orange)';
                    
                    btn.style.display = 'flex';
                    btn.innerHTML = `<i class="fa-solid fa-rotate-left"></i> Undo`;
                    btn.style.background = 'rgba(255,77,77,0.2)';
                    btn.style.color = 'var(--accent-danger)';
                    ptsBox.style.display = 'none';

                } else {
                    // UNASSIGNED
                    badge.style.display = 'none';
                    if (card.classList.contains('points-mode')) {
                        // User clicked custom payout, show inputs
                        btn.style.display = 'none';
                        ptsBox.style.display = 'flex';
                    } else {
                        // Default state
                        ptsBox.style.display = 'none';
                        btn.style.display = 'flex';
                        if (nextPrize) {
                            btn.innerHTML = `<i class="fa-solid fa-crown"></i> ${nextPrize.rank}${getRankSuffix(nextPrize.rank)}`;
                            btn.style.background = 'var(--accent-gradient)';
                            btn.style.color = 'white';
                        } else {
                            btn.innerHTML = `<i class="fa-solid fa-plus"></i> Custom Payout`;
                            btn.style.background = 'rgba(255,255,255,0.1)';
                            btn.style.color = 'white';
                        }
                    }
                }
            });
        }

        function handleTeamAction(cleanId, teamName) {
            triggerHaptic();
            let card = document.getElementById(`card-${cleanId}`);

            // IF ASSIGNED: UNDO ACTION
            if (rankAssignments[teamName] || customCashAssignments[teamName] || pointAssignments[teamName]) {
                delete rankAssignments[teamName];
                delete cashAssignments[teamName];
                delete customCashAssignments[teamName];
                delete pointAssignments[teamName];
                
                document.getElementById(`inp-cash-${cleanId}`).value = "";
                document.getElementById(`inp-pts-${cleanId}`).value = "";
                
                updateActionButtons();
                updateTotalsUI();
                return;
            }

            // IF NOT ASSIGNED: ASSIGN ACTION
            let nextPrize = getNextAvailablePrize();
            if (nextPrize) {
                // Give Podium
                rankAssignments[teamName] = nextPrize.rank;
                cashAssignments[teamName] = nextPrize.amount;
                updateActionButtons();
                updateTotalsUI();
            } else {
                // Open Custom Allocator
                card.classList.add('points-mode');
                updateActionButtons();
            }
        }

        function saveCustomPayout(cleanId, teamName) {
            triggerHaptic();
            let cInp = document.getElementById(`inp-cash-${cleanId}`).value;
            let pInp = document.getElementById(`inp-pts-${cleanId}`).value;
            
            let cash = parseInt(cInp) || 0;
            let pts = parseInt(pInp) || 0;
            
            let card = document.getElementById(`card-${cleanId}`);
            
            if (cash > 0 || pts > 0) {
                if (cash > 0) customCashAssignments[teamName] = cash;
                if (pts > 0) pointAssignments[teamName] = pts;
            }
            card.classList.remove('points-mode');
            updateActionButtons();
            updateTotalsUI();
        }

        function updateTotalsUI() {
            let totC = 0; let totP = 0;
            Object.values(cashAssignments).forEach(v => totC += v);
            Object.values(customCashAssignments).forEach(v => totC += v);
            Object.values(pointAssignments).forEach(v => totP += v);

            let orgEarn = parseInt(userData.earnings) || 0;
            let orgPts = parseInt(userData.points) || 0;

            let cText = document.getElementById('totCash');
            let pText = document.getElementById('totPts');
            let subBtn = document.getElementById('btnFinalize');

            cText.innerText = `₹${totC.toLocaleString()}`;
            pText.innerText = `${totP.toLocaleString()} PTS`;

            if(document.body.classList.contains('theme-vip')) cText.style.color = "#FFD700";

            let hasError = false;
            if (totC > orgEarn) { cText.classList.add('err'); hasError = true; } else { cText.classList.remove('err'); }
            if (totP > orgPts) { pText.classList.add('err'); hasError = true; } else { pText.classList.remove('err'); }

            if (hasError) {
                subBtn.disabled = true;
                subBtn.innerText = "Insufficient Wallet Balance";
                subBtn.style.background = "rgba(255,77,77,0.2)";
                subBtn.style.color = "var(--accent-danger)";
            } else {
                subBtn.disabled = false;
                subBtn.innerText = "Finalize Payouts";
                subBtn.style.background = ""; 
                subBtn.style.color = "";
            }
        }

        // --- STEP 4: SUBMIT BATCH RESOLUTION ---
        function submitResolution() {
            let hasAnyCash = Object.keys(cashAssignments).length > 0 || Object.keys(customCashAssignments).length > 0;
            if (!hasAnyCash && Object.keys(pointAssignments).length === 0) {
                showToast("No prizes or points assigned!", true); return;
            }

            if (!confirm("⚠️ Confirm Payouts?\n\nThis will deduct the totals from your wallet, credit the players, and permanently close this match.")) return;

            triggerHaptic();
            const btn = document.getElementById('btnFinalize');
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Processing Transaction...";
            btn.disabled = true;

            // Format Data
            let cArr = []; 
            // Add Podium Cash
            for (let team in cashAssignments) { cArr.push({name: team, amount: cashAssignments[team]}); }
            // Add Custom Cash
            for (let team in customCashAssignments) { 
                let existing = cArr.find(x => x.name === team);
                if (existing) existing.amount += customCashAssignments[team];
                else cArr.push({name: team, amount: customCashAssignments[team]}); 
            }
            
            let pArr = []; 
            for (let team in pointAssignments) { pArr.push({name: team, points: pointAssignments[team]}); }

            let payload = {
                action: 'resolve_match_batch',
                match_id: activeMatchId,
                org_email: userData.email,
                cash_winners: cArr,
                point_winners: pArr
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    let totC = 0; cArr.forEach(x => totC += x.amount);
                    let totP = 0; pArr.forEach(x => totP += x.points);
                    userData.earnings = (parseInt(userData.earnings) || 0) - totC;
                    userData.points = (parseInt(userData.points) || 0) - totP;
                    localStorage.setItem('tournyx_user', JSON.stringify(userData));

                    showToast("✅ Match Closed & Payouts Sent!");
                    setTimeout(() => { window.location.href = 'profile.html'; }, 1500);
                } else {
                    showToast(data.message || "Transaction failed.", true);
                    btn.innerText = "Finalize Payouts"; btn.disabled = false;
                }
            })
            .catch(err => {
                showToast("Network Error. Please verify in dashboard.", true);
                setTimeout(() => { window.location.href = 'profile.html'; }, 2000);
            });
        }
    </script>
</body>
