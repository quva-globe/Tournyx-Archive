<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://tournyx.in/favicon.ico" sizes="any">
    <link rel="icon" href="https://tournyx.in/favicon.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="https://tournyx.in/apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Resolve Match - Tournyx</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- GLOBAL VARIABLES --- */
        :root {
            --primary-bg: #05020c;
            --secondary-bg: #0a0514;
            --card-bg: rgba(15, 7, 30, 0.6);
            --card-border: rgba(0, 242, 255, 0.15);
            --accent-cyan: #00f2ff;
            --accent-purple: #bd00ff;
            --accent-orange: #ff9900;
            --accent-green: #00ff7f;
            --accent-danger: #ff4d4d;
            --accent-gradient: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            --font-head: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        .theme-vip {
            --accent-cyan: #FFD700;
            --accent-purple: #FFA500;
            --accent-gradient: linear-gradient(135deg, #FFE87C, #D4AF37, #FF8C00);
            --card-border: rgba(212, 175, 55, 0.3);
        }

        * { -ms-overflow-style: none !important; scrollbar-width: none !important; margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; background: transparent !important; }

        /* ABSOLUTE DESKTOP/MOBILE RESET */
        body {
            background-color: var(--primary-bg); 
            color: white; 
            font-family: var(--font-body);
            padding-bottom: calc(140px + env(safe-area-inset-bottom, 0px)); 
            overflow-x: hidden;
            padding-top: calc(80px + env(safe-area-inset-top, 0px)) !important; 
            margin: 0 !important;
            width: 100vw;
            min-height: 100vh;
            display: block;
        }

        .main-container { 
            max-width: 800px; 
            margin: 0 auto !important; 
            padding: 0 20px; 
            width: 100%; 
            display: block;
        }

        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 0%, #15062e 0%, #05020c 100%); pointer-events: none; }

        /* BULLETPROOF HEADER ALIGNMENT */
        .top-header { 
            position: fixed; top: 0 !important; left: 0; width: 100%; 
            height: calc(65px + env(safe-area-inset-top, 0px)); 
            padding: env(safe-area-inset-top, 0px) 20px 0 20px; 
            background: rgba(5, 2, 12, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 9999; 
            display: flex; align-items: center; justify-content: space-between; box-sizing: border-box;
        }
        .back-btn { color: white; font-size: 1.3rem; cursor: pointer; text-decoration: none; padding: 10px 10px 10px 0; transition: 0.3s; display: flex; align-items: center;}
        .back-btn:active { transform: translateX(-5px); color: var(--accent-cyan); }
        .theme-vip .back-btn:active { color: #FFD700; }
        .page-title { font-family: var(--font-head); font-size: 1.2rem; font-weight: bold; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 1px; margin: 0; }

        /* COMMAND CENTER WALLET BAR */
        .wallet-bar { 
            background: linear-gradient(135deg, rgba(0, 242, 255, 0.05), rgba(189, 0, 255, 0.05)); 
            border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 25px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.3); 
            backdrop-filter: blur(10px); transition: all 0.4s ease; animation: fadeInDown 0.6s ease backwards; 
        }
        .theme-vip .wallet-bar { background: linear-gradient(135deg, rgba(255, 215, 0, 0.05), rgba(255, 140, 0, 0.05)); }
        .wallet-stat { text-align: center; flex: 1; }
        .wallet-stat h5 { font-family: var(--font-head); font-size: 0.8rem; color: #a0a0b0; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px;}
        .wallet-stat span { font-family: var(--font-head); font-size: 1.5rem; font-weight: 900; color: white; text-shadow: 0 0 10px rgba(255,255,255,0.2);}
        .wallet-divider { width: 2px; height: 40px; background: rgba(255,255,255,0.1); }

        .section-title { font-family: var(--font-head); font-size: 1.2rem; color: white; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; border-left: 4px solid var(--accent-cyan); padding-left: 10px;}
        .theme-vip .section-title { border-left-color: #FFD700; }

        /* TOURNAMENT LIST - TACTICAL CARDS */
        .tourney-card { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); 
            border-left: 3px solid var(--accent-purple); border-radius: 16px; 
            padding: 20px; margin-bottom: 15px; cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; justify-content: space-between; align-items: center; 
            backdrop-filter: blur(10px); animation: fadeInUp 0.5s ease backwards; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .theme-vip .tourney-card { border-left-color: #FFD700; }
        .tourney-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.6); background: rgba(255,255,255,0.02); }
        .tourney-card:active { transform: scale(0.97); border-color: var(--accent-cyan); box-shadow: inset 0 0 15px rgba(0,242,255,0.1); }
        .theme-vip .tourney-card:active { border-color: #FFD700; box-shadow: inset 0 0 15px rgba(255,215,0,0.1); }
        .t-info { flex: 1; min-width: 0; }
        .t-info h4 { font-family: var(--font-head); font-size: 1.15rem; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white; font-weight: bold;}
        .t-info p { font-size: 0.9rem; color: #888; display: flex; align-items: center; gap: 8px;}
        .t-info p span { background: rgba(0,255,127,0.1); color: var(--accent-green); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-family: var(--font-head); font-weight: bold; border: 1px solid rgba(0,255,127,0.3);}
        .t-arrow { color: var(--accent-cyan); font-size: 1.4rem; margin-left: 10px; flex-shrink: 0; transition: 0.3s; opacity: 0.7;}
        .theme-vip .t-arrow { color: #FFD700; }
        .tourney-card:hover .t-arrow { transform: translateX(5px); opacity: 1;}

        /* RESOLUTION POPUP MODAL (Dashboard style) */
        #resolutionView { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); 
            z-index: 10000; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s ease; 
        }
        #resolutionView.active { display: flex; opacity: 1; }
        
        .resolution-modal { 
            background: var(--secondary-bg); width: 95%; max-width: 650px; max-height: 85vh; 
            border-radius: 24px; border: 1px solid var(--accent-cyan); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,242,255,0.05); 
            padding: 25px 20px 100px 20px; position: relative; overflow-y: auto; 
            transform: scale(0.9) translateY(20px); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .theme-vip .resolution-modal { border-color: #FFD700; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(255,215,0,0.05); }
        #resolutionView.active .resolution-modal { transform: scale(1) translateY(0); opacity: 1; }
        
        .close-modal-btn { position: absolute; top: 20px; right: 20px; color: #888; background: rgba(255,255,255,0.05); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; transition: 0.3s; z-index: 10; border: 1px solid transparent;}
        .close-modal-btn:hover { color: white; background: var(--accent-danger); border-color: var(--accent-danger); transform: rotate(90deg); }
        
        .prize-legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 16px; border: 1px dashed rgba(255,255,255,0.1); justify-content: center;}
        .prize-tag { padding: 6px 14px; border-radius: 8px; font-size: 0.85rem; font-family: var(--font-head); font-weight: bold; border: 1px solid; display: flex; align-items: center; gap: 6px; transition: 0.3s; text-transform: uppercase;}
        .prize-tag.p1 { color: #FFD700; border-color: rgba(255,215,0,0.5); background: rgba(255,215,0,0.1); box-shadow: 0 0 15px rgba(255,215,0,0.2); }
        .prize-tag.p2 { color: #C0C0C0; border-color: rgba(192,192,192,0.5); background: rgba(192,192,192,0.1); box-shadow: 0 0 15px rgba(192,192,192,0.2); }
        .prize-tag.p3 { color: #cd7f32; border-color: rgba(205,127,50,0.5); background: rgba(205,127,50,0.1); box-shadow: 0 0 15px rgba(205,127,50,0.2); }
        .prize-tag.pn { color: var(--accent-cyan); border-color: rgba(0,242,255,0.4); background: rgba(0,242,255,0.1); }

        .team-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 18px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 12px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; animation: fadeInUp 0.4s ease backwards;}
        .team-card:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1); }
        .team-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .team-name { font-family: var(--font-head); font-weight: bold; font-size: 1.1rem; color: white; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px;}
        .team-name i { color: #888; font-size: 0.9rem;}

        .action-btn { background: var(--accent-gradient); border: 1px solid transparent; padding: 10px 18px; border-radius: 10px; color: white; font-family: var(--font-head); font-weight: bold; font-size: 0.85rem; cursor: pointer; transition: all 0.3s; text-transform: uppercase; flex-shrink: 0; display: flex; align-items: center; gap: 6px; box-shadow: 0 5px 15px rgba(0,242,255,0.2);}
        .action-btn:active { transform: scale(0.92); box-shadow: 0 0 5px rgba(0,242,255,0.5); }
        
        .rank-badge { display: none; font-family: var(--font-head); font-weight: 900; font-size: 0.9rem; padding: 6px 14px; border-radius: 8px; text-transform: uppercase; transition: 0.3s; white-space: nowrap; letter-spacing: 1px;}
        .team-card.ranked-1 { border-color: #FFD700; background: rgba(255,215,0,0.08); transform: scale(1.02); box-shadow: 0 10px 25px rgba(255,215,0,0.15);}
        .team-card.ranked-1 .rank-badge { display: inline-block; background: #FFD700; color: black; box-shadow: 0 0 15px rgba(255,215,0,0.5); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .team-card.ranked-2 { border-color: #C0C0C0; background: rgba(192,192,192,0.08); }
        .team-card.ranked-2 .rank-badge { display: inline-block; background: #C0C0C0; color: black; box-shadow: 0 0 15px rgba(192,192,192,0.5); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .team-card.ranked-3 { border-color: #cd7f32; background: rgba(205,127,50,0.08); }
        .team-card.ranked-3 .rank-badge { display: inline-block; background: #cd7f32; color: black; box-shadow: 0 0 15px rgba(205,127,50,0.5); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .team-card.ranked-n { border-color: var(--accent-cyan); background: rgba(0,242,255,0.05); }
        .team-card.ranked-n .rank-badge { display: inline-block; background: var(--accent-cyan); color: black; box-shadow: 0 0 15px rgba(0,242,255,0.5); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* CUSTOM PAYOUT ALLOCATOR */
        .points-allocator { display: none; width: 100%; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 15px; align-items: center; gap: 10px; flex-wrap: wrap; animation: fadeInDown 0.3s ease; }
        .team-card.points-mode .points-allocator { display: flex; }
        .points-allocator input { flex: 1; min-width: 100px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 12px 15px; border-radius: 10px; color: white; font-family: var(--font-head); font-size: 1rem; outline: none; transition: 0.3s; }
        .points-allocator input:focus { border-color: var(--accent-cyan); box-shadow: inset 0 0 10px rgba(0,242,255,0.1); background: rgba(0,0,0,0.8);}
        .theme-vip .points-allocator input:focus { border-color: #FFD700; box-shadow: inset 0 0 10px rgba(255,215,0,0.1); }
        .pts-save-btn { background: rgba(0,255,127,0.1); border: 1px solid var(--accent-green); color: var(--accent-green); padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; flex-shrink: 0; font-size: 1.1rem;}
        .pts-save-btn:active { background: var(--accent-green); color: black; transform: scale(0.92); box-shadow: 0 0 15px rgba(0,255,127,0.5);}

        /* TACTICAL FLOATING ACTION BAR */
        .bottom-summary-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            padding: 15px 20px calc(15px + env(safe-area-inset-bottom, 0px)); 
            background: rgba(5,2,12,0.98); backdrop-filter: blur(20px); 
            border-top: 1px solid var(--accent-cyan); z-index: 10001; 
            box-shadow: 0 -10px 40px rgba(0,242,255,0.1); 
            display: none; flex-direction: column; align-items: center; gap: 12px; 
        }
        .theme-vip .bottom-summary-bar { border-top-color: #FFD700; box-shadow: 0 -10px 40px rgba(255,215,0,0.1); }
        .bottom-summary-bar.active { display: flex; animation: slideInUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .totals-text { font-family: var(--font-head); font-size: 0.95rem; color: #aaa; text-align: center; width: 100%; display: flex; justify-content: space-between; max-width: 800px; align-items: center; text-transform: uppercase;}
        .totals-text b { color: white; font-size: 1.2rem; transition: 0.3s; letter-spacing: 1px;}
        .totals-text .err { color: var(--accent-danger) !important; text-shadow: 0 0 10px rgba(255,77,77,0.8); }

        .submit-resolution-btn { width: 100%; max-width: 800px; padding: 18px; background: var(--accent-gradient); border: none; border-radius: 14px; color: white; font-family: var(--font-head); font-size: 1.15rem; font-weight: 900; text-transform: uppercase; cursor: pointer; box-shadow: 0 8px 25px rgba(0,242,255,0.4); transition: 0.3s; letter-spacing: 2px; }
        .theme-vip .submit-resolution-btn { box-shadow: 0 8px 25px rgba(255,215,0,0.4); color: black;}
        .submit-resolution-btn:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(0,242,255,0.3); }
        .submit-resolution-btn:disabled { background: rgba(255,255,255,0.1); color: #888; box-shadow: none; cursor: not-allowed; transform: none; border: 1px solid rgba(255,255,255,0.1);}

        #customToast { visibility: hidden; min-width: 280px; background: rgba(0,242,255,0.95); backdrop-filter: blur(10px); color: #000; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 10005; left: 50%; bottom: -50px; transform: translateX(-50%); font-family: var(--font-head); font-weight: bold; box-shadow: 0 8px 30px rgba(0,242,255,0.5); opacity: 0; transition: opacity 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .theme-vip #customToast { background: rgba(255,215,0,0.95); box-shadow: 0 8px 30px rgba(255,215,0,0.5); }
        #customToast.show { visibility: visible; opacity: 1; bottom: 100px; }

        .loading-state { text-align: center; padding: 50px 20px; color: #888; font-size: 1rem; font-family: var(--font-head); text-transform: uppercase; letter-spacing: 1px;}
        .loading-state i { font-size: 2.5rem; color: var(--accent-cyan); margin-bottom: 20px; display: block; filter: drop-shadow(0 0 10px rgba(0,242,255,0.5));}
        .theme-vip .loading-state i { color: #FFD700; filter: drop-shadow(0 0 10px rgba(255,215,0,0.5)); }

        /* Keyframes */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }

    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <header class="top-header">
        <a href="profile.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <h3 class="page-title">Match Resolution</h3>
        <div style="width: 24px;"></div> 
    </header>

    <div class="main-container">
        
        <div class="wallet-bar">
            <div class="wallet-stat">
                <h5>My Earnings</h5>
                <span style="color: var(--accent-cyan);">₹<span id="orgEarningsBal">0</span></span>
            </div>
            <div class="wallet-divider"></div>
            <div class="wallet-stat">
                <h5>My Points</h5>
                <span style="color: var(--accent-orange);"><span id="orgPointsBal">0</span> PTS</span>
            </div>
        </div>

        <div id="tourneyListSection">
            <div class="section-title"><i class="fa-solid fa-server"></i> Active Matches Awaiting Payout</div>
            <div id="tourneyListContainer">
                <div class="loading-state"><i class="fa-solid fa-circle-notch fa-spin"></i> Synchronizing...</div>
            </div>
        </div>

        <div id="resolutionView">
            <div class="resolution-modal">
                <div class="close-modal-btn" onclick="closeResolutionView()"><i class="fa-solid fa-xmark"></i></div>
                
                <div class="section-title" style="border:none; margin-bottom: 10px; padding-right: 30px; font-size: 1.3rem;">
                    <i class="fa-solid fa-trophy" style="color: #FFD700;"></i> <span id="resMatchTitle" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Tournament Name</span>
                </div>
                
                <div class="prize-legend" id="prizeLegendBox"></div>

                <p style="font-size: 0.85rem; color: #a0a0b0; margin-bottom: 20px; line-height: 1.5; text-align: center;">
                    Tap <b>Assign</b> to distribute podium prizes automatically. Tap <b>Custom Payout</b> to reward other participants. 
                </p>

                <div id="teamsContainer">
                    <div class="loading-state"><i class="fa-solid fa-circle-notch fa-spin"></i> Compiling Roster...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-summary-bar" id="submitBar">
        <div class="totals-text">
            <span>Total Deduct:</span>
            <span><b id="totCash" style="color:var(--accent-cyan);">₹0</b> &nbsp;|&nbsp; <b id="totPts" style="color:var(--accent-orange);">0 PTS</b></span>
        </div>
        <button class="submit-resolution-btn" id="btnFinalize" onclick="submitResolution()">Finalize Payouts</button>
    </div>

    <div id="customToast">Notification</div>

    <script>
        // --- API ENGINE ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbyqqTpgaflxKJ9xH0jq7mJ_jLzcoNhas3gNo0h5gvoa_6r5Ae9NFxJAJp7ZoYNnMRKl/exec'; 
        let userData = JSON.parse(localStorage.getItem('tournyx_user')) || {};
        
        let activeMatchId = "";
        let allPrizes = []; 
        let singleWinnerMode = false; 
        
        let rankAssignments = {}; 
        let cashAssignments = {}; 
        let customCashAssignments = {}; 
        let pointAssignments = {}; 

        async function secureFetch(payload) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (error) {
                console.error("Fetch Error:", error);
                throw error;
            }
        }

        function triggerHaptic() { if(navigator.vibrate) navigator.vibrate(40); }
        
        function showToast(msg, isError = false) {
            const t = document.getElementById('customToast');
            t.innerHTML = isError ? `<i class="fa-solid fa-triangle-exclamation"></i> ${msg}` : `<i class="fa-solid fa-circle-check"></i> ${msg}`; 
            t.className = "show";
            t.style.backgroundColor = isError ? "var(--accent-danger)" : (document.body.classList.contains('theme-vip') ? "#FFD700" : "var(--accent-cyan)");
            t.style.color = isError ? "white" : "#000";
            setTimeout(() => t.className = "", 3000);
        }

        function checkVIP() {
            if (String(userData.is_premium).toLowerCase() === 'true') {
                document.body.classList.add('theme-vip');
            }
        }

        // --- BACKGROUND ANIMATION ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let pArray = [];
        class P { constructor(){ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.s=Math.random()*2; this.c=Math.random()>0.5?'#bd00ff':'#00f2ff'; } u(){ this.y-=0.5; if(this.y<0)this.y=canvas.height; } d(){ ctx.fillStyle=this.c; ctx.globalAlpha=0.3; ctx.beginPath(); ctx.arc(Math.floor(this.x),Math.floor(this.y),this.s,0,Math.PI*2); ctx.fill(); } }
        for(let i=0; i<30; i++) pArray.push(new P());
        function anim(){ ctx.clearRect(0,0,canvas.width,canvas.height); pArray.forEach(p=>{p.u();p.d()}); requestAnimationFrame(anim); }
        anim();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

        document.addEventListener("DOMContentLoaded", () => {
            if (!userData.email || userData.role !== 'organizer') {
                window.location.href = 'profile.html';
                return;
            }
            checkVIP();
            
            document.getElementById('orgEarningsBal').innerText = (parseInt(userData.earnings) || 0).toLocaleString();
            document.getElementById('orgPointsBal').innerText = (parseInt(userData.points) || 0).toLocaleString();
            
            fetchOrganizerTournaments();
        });

        // --- STEP 1: FETCH TOURNAMENTS ---
        function fetchOrganizerTournaments() {
            const container = document.getElementById('tourneyListContainer');
            
            secureFetch({ action: 'get_tournaments' })
            .then(data => {
                if(data.status === "success" && data.data) {
                    let myEmailStr = String(userData.email).toLowerCase().trim();
                    let myEvents = data.data.filter(t => {
                        let dbStatus = String(t.db_status || t.status || "").toLowerCase();
                        if (dbStatus === 'completed' || dbStatus === 'deleted' || dbStatus === 'cancelled') return false;
                        let backendEmail = String(t.org_email || t.organizer_email || t.email || "").toLowerCase().trim();
                        return backendEmail === myEmailStr;
                    });

                    container.innerHTML = "";
                    if(myEvents.length === 0) {
                        container.innerHTML = "<div class='loading-state' style='color:#888;'><i class='fa-solid fa-check-double' style='color:#888; filter:none;'></i>All Caught Up!<br><span style='font-size:0.8rem; font-family:var(--font-body); text-transform:none;'>No active matches await resolution.</span></div>";
                    } else {
                        myEvents.forEach((t, index) => {
                            let matchId = t.id || t.match_id;
                            let rawTitle = String(t.title || "Untitled");
                            let animDelay = index * 0.1;
                            
                            // PERFECT PRIZE EXTRACTION LOGIC
                            let pObj = {};
                            try {
                                let pData = t.prize_json || t.prize_distribution || "";
                                if(pData.startsWith("{")) {
                                    let parsed = JSON.parse(pData);
                                    for (let key in parsed) {
                                        let numRank = parseInt(key.replace(/[^0-9]/g, ''));
                                        if(!isNaN(numRank) && numRank > 0 && numRank <= 20) {
                                            pObj[numRank] = parseInt(String(parsed[key]).replace(/[^0-9]/g, '')) || 0;
                                        }
                                    }
                                } else {
                                    if(t.prize1) pObj[1] = parseInt(String(t.prize1).replace(/[^0-9]/g, ''))||0;
                                    if(t.prize2) pObj[2] = parseInt(String(t.prize2).replace(/[^0-9]/g, ''))||0;
                                    if(t.prize3) pObj[3] = parseInt(String(t.prize3).replace(/[^0-9]/g, ''))||0;
                                    if(!pObj[1] && t.prize_pool) pObj[1] = parseInt(String(t.prize_pool).replace(/[^0-9]/g, ''))||0;
                                }
                            } catch(e) {}
                            
                            let safeTitleEnc = encodeURIComponent(rawTitle);
                            let safePrizeEnc = encodeURIComponent(JSON.stringify(pObj));

                            container.innerHTML += `
                                <div class="tourney-card" style="animation-delay: ${animDelay}s" onclick="openResolutionView('${matchId}', '${safeTitleEnc}', '${safePrizeEnc}')">
                                    <div class="t-info">
                                        <h4>${rawTitle.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</h4>
                                        <p><span>LIVE</span> ${t.match_period || t.date || 'TBD'}</p>
                                    </div>
                                    <i class="fa-solid fa-chevron-right t-arrow"></i>
                                </div>
                            `;
                        });
                    }
                } else {
                    container.innerHTML = "<div class='loading-state' style='color:#ff4d4d;'><i class='fa-solid fa-triangle-exclamation' style='color:#ff4d4d;'></i>Failed to load matches.</div>";
                }
            }).catch(() => {
                container.innerHTML = "<div class='loading-state' style='color:#ff4d4d;'><i class='fa-solid fa-wifi' style='color:#ff4d4d;'></i>Network Connection Error.</div>";
            });
        }

        // --- STEP 2: OPEN RESOLVE VIEW ---
        function openResolutionView(matchId, titleEnc, prizeJsonStrEncoded) {
            triggerHaptic();
            activeMatchId = matchId;
            
            document.getElementById('resolutionView').classList.add('active');
            document.getElementById('submitBar').classList.add('active');
            document.body.style.overflow = 'hidden'; 
            
            document.getElementById('resMatchTitle').innerText = decodeURIComponent(titleEnc);

            allPrizes = [];
            rankAssignments = {};
            cashAssignments = {};
            customCashAssignments = {};
            pointAssignments = {};
            singleWinnerMode = false;
            updateTotalsUI();

            let pObj = JSON.parse(decodeURIComponent(prizeJsonStrEncoded));
            let legendHtml = "";
            
            let prizeKeys = Object.keys(pObj).sort((a,b) => parseInt(a) - parseInt(b));
            
            if (prizeKeys.length <= 1) {
                singleWinnerMode = true;
            }

            prizeKeys.forEach(k => {
                let rankNum = parseInt(k);
                let amt = pObj[k];
                if(amt > 0) {
                    allPrizes.push({rank: rankNum, amount: amt});
                    let icon = rankNum == 1 ? 'fa-trophy' : (rankNum == 2 ? 'fa-medal' : 'fa-award');
                    let cssClass = rankNum == 1 ? 'p1' : (rankNum == 2 ? 'p2' : (rankNum == 3 ? 'p3' : 'pn'));
                    legendHtml += `<div class="prize-tag ${cssClass}"><i class="fa-solid ${icon}"></i> ${rankNum}${getRankSuffix(rankNum)}: ₹${amt}</div>`;
                }
            });

            if(allPrizes.length === 0) {
                allPrizes.push({rank: 1, amount: 0});
                legendHtml = `<div class="prize-tag p1"><i class="fa-solid fa-trophy"></i> Winner Takes All</div>`;
            }
            
            document.getElementById('prizeLegendBox').innerHTML = legendHtml;

            loadTeams(matchId);
        }

        function closeResolutionView() {
            triggerHaptic();
            document.getElementById('resolutionView').classList.remove('active');
            document.getElementById('submitBar').classList.remove('active');
            document.body.style.overflow = '';
            activeMatchId = "";
        }

        function loadTeams(matchId) {
            const container = document.getElementById('teamsContainer');
            container.innerHTML = `<div class="loading-state"><i class="fa-solid fa-circle-notch fa-spin"></i> Compiling Roster...</div>`;

            secureFetch({ action: 'get_all_matches' })
            .then(data => {
                if(data.status === "success" && data.data) {
                    let matchRegs = [];
                    try {
                        let parsedData = typeof data.data === 'string' ? JSON.parse(data.data) : data.data;
                        matchRegs = parsedData.filter(m => String(m.match_id) === String(matchId));
                    } catch(e) {
                        matchRegs = data.data.filter(m => String(m.match_id) === String(matchId));
                    }
                    
                    container.innerHTML = "";
                    if(matchRegs.length > 0) {
                        matchRegs.forEach((team, index) => {
                            let rawName = team.clan || team.username || team.user_email || "Unknown Player";
                            let teamName = rawName;
                            let animDelay = index * 0.05;
                            
                            try {
                                if (typeof rawName === 'string' && (rawName.trim().startsWith('{') || rawName.includes('username'))) {
                                    let cleanJson = rawName.replace(/'/g, '"');
                                    let p = JSON.parse(cleanJson);
                                    teamName = p.clan || p.clan_name || p.username || p.ign || rawName;
                                }
                            } catch(e) {
                                let match = String(rawName).match(/"(?:clan|clan_name|username|ign)"\s*:\s*"([^"]+)"/i);
                                if (match) teamName = match[1];
                            }
                            
                            let cleanId = String(teamName).replace(/[^a-zA-Z0-9]/g, ''); 
                            let safeTeamNameForJs = String(teamName).replace(/"/g, "&quot;").replace(/'/g, "\\'");
                            
                            container.innerHTML += `
                            <div class="team-card" id="card-${cleanId}" data-teamname="${safeTeamNameForJs}" style="animation-delay: ${animDelay}s">
                                <div class="team-top">
                                    <div class="team-name"><i class="fa-solid fa-crosshairs"></i> ${teamName}</div>
                                    <div class="rank-badge" id="badge-${cleanId}"></div>
                                    <button class="action-btn" id="btn-${cleanId}" onclick="handleTeamAction('${cleanId}', '${safeTeamNameForJs}')">
                                        <i class="fa-solid fa-crown"></i> Assign
                                    </button>
                                </div>
                                <div class="points-allocator" id="pts-box-${cleanId}">
                                    <input type="tel" inputmode="numeric" id="inp-cash-${cleanId}" placeholder="₹ Custom Cash">
                                    <input type="tel" inputmode="numeric" id="inp-pts-${cleanId}" placeholder="Custom PTS">
                                    <button class="pts-save-btn" onclick="saveCustomPayout('${cleanId}', '${safeTeamNameForJs}')"><i class="fa-solid fa-check"></i></button>
                                </div>
                            </div>`;
                        });
                        updateActionButtons();
                    } else {
                        container.innerHTML = "<div class='loading-state' style='color:#888;'><i class='fa-solid fa-user-slash' style='color:#888; filter:none;'></i>No teams registered.</div>";
                        document.getElementById('btnFinalize').disabled = true;
                    }
                } else {
                    container.innerHTML = "<div class='loading-state' style='color:#ff4d4d;'><i class='fa-solid fa-triangle-exclamation' style='color:#ff4d4d;'></i>Error loading roster.</div>";
                }
            }).catch(() => {
                container.innerHTML = "<div class='loading-state' style='color:#ff4d4d;'><i class='fa-solid fa-wifi' style='color:#ff4d4d;'></i>Network error.</div>";
            });
        }

        // --- STEP 3: INTERACTIVE PODIUM ASSIGNMENT ---
        function getRankSuffix(i) {
            let j = i % 10, k = i % 100;
            if (j == 1 && k != 11) return "st";
            if (j == 2 && k != 12) return "nd";
            if (j == 3 && k != 13) return "rd";
            return "th";
        }

        function getNextAvailablePrize() {
            for (let i = 0; i < allPrizes.length; i++) {
                let p = allPrizes[i];
                let isAssigned = Object.values(rankAssignments).includes(p.rank);
                if (!isAssigned) return p;
            }
            return null; 
        }

        function updateActionButtons() {
            let nextPrize = getNextAvailablePrize();
            
            document.querySelectorAll('.team-card').forEach(card => {
                let teamName = card.dataset.teamname;
                let btn = card.querySelector('.action-btn');
                let ptsBox = card.querySelector('.points-allocator');
                let badge = card.querySelector('.rank-badge');
                
                card.classList.remove('ranked-1', 'ranked-2', 'ranked-3', 'ranked-n', 'has-points');

                if (rankAssignments[teamName]) {
                    let rank = rankAssignments[teamName];
                    let amt = cashAssignments[teamName] || 0;
                    
                    let rankClass = rank <= 3 ? `ranked-${rank}` : 'ranked-n';
                    card.classList.add(rankClass);
                    badge.style.display = 'inline-block';
                    badge.innerText = `${rank}${getRankSuffix(rank)} (₹${amt})`;
                    
                    btn.style.display = 'flex';
                    btn.innerHTML = `<i class="fa-solid fa-rotate-left"></i> Undo`;
                    btn.style.background = 'rgba(255,77,77,0.15)';
                    btn.style.color = 'var(--accent-danger)';
                    ptsBox.style.display = 'none';

                } else if (customCashAssignments[teamName] || pointAssignments[teamName]) {
                    let c = customCashAssignments[teamName] || 0;
                    let p = pointAssignments[teamName] || 0;
                    
                    let bText = [];
                    if (c > 0) bText.push(`₹${c}`);
                    if (p > 0) bText.push(`${p} PTS`);
                    
                    card.classList.add('has-points');
                    badge.style.display = 'inline-block';
                    badge.innerText = "+" + bText.join(' | ');
                    badge.style.background = 'rgba(255,255,255,0.1)';
                    badge.style.color = document.body.classList.contains('theme-vip') ? '#FFD700' : 'var(--accent-orange)';
                    
                    btn.style.display = 'flex';
                    btn.innerHTML = `<i class="fa-solid fa-rotate-left"></i> Undo`;
                    btn.style.background = 'rgba(255,77,77,0.15)';
                    btn.style.color = 'var(--accent-danger)';
                    ptsBox.style.display = 'none';

                } else {
                    badge.style.display = 'none';
                    if (card.classList.contains('points-mode')) {
                        btn.style.display = 'none';
                        ptsBox.style.display = 'flex';
                    } else {
                        ptsBox.style.display = 'none';
                        btn.style.display = 'flex';
                        if (nextPrize) {
                            btn.innerHTML = `<i class="fa-solid fa-crown"></i> Set ${nextPrize.rank}${getRankSuffix(nextPrize.rank)}`;
                            btn.style.background = 'var(--accent-gradient)';
                            btn.style.color = 'white';
                        } else {
                            if (singleWinnerMode && Object.keys(rankAssignments).length > 0) {
                                btn.style.display = 'none';
                                ptsBox.style.display = 'flex';
                            } else {
                                btn.innerHTML = `<i class="fa-solid fa-plus"></i> Custom Payout`;
                                btn.style.background = 'rgba(255,255,255,0.08)';
                                btn.style.color = 'white';
                            }
                        }
                    }
                }
            });
        }

        function handleTeamAction(cleanId, teamName) {
            triggerHaptic();
            let card = document.getElementById(`card-${cleanId}`);

            if (rankAssignments[teamName] || customCashAssignments[teamName] || pointAssignments[teamName]) {
                delete rankAssignments[teamName];
                delete cashAssignments[teamName];
                delete customCashAssignments[teamName];
                delete pointAssignments[teamName];
                
                document.getElementById(`inp-cash-${cleanId}`).value = "";
                document.getElementById(`inp-pts-${cleanId}`).value = "";
                
                updateActionButtons();
                updateTotalsUI();
                return;
            }

            let nextPrize = getNextAvailablePrize();
            if (nextPrize) {
                rankAssignments[teamName] = nextPrize.rank;
                cashAssignments[teamName] = nextPrize.amount;
                updateActionButtons();
                updateTotalsUI();
            } else {
                card.classList.add('points-mode');
                updateActionButtons();
            }
        }

        function saveCustomPayout(cleanId, teamName) {
            triggerHaptic();
            let cInp = document.getElementById(`inp-cash-${cleanId}`).value;
            let pInp = document.getElementById(`inp-pts-${cleanId}`).value;
            
            let cash = parseInt(cInp) || 0;
            let pts = parseInt(pInp) || 0;
            
            let card = document.getElementById(`card-${cleanId}`);
            
            if (cash > 0 || pts > 0) {
                if (cash > 0) customCashAssignments[teamName] = cash;
                if (pts > 0) pointAssignments[teamName] = pts;
            }
            card.classList.remove('points-mode');
            updateActionButtons();
            updateTotalsUI();
        }

        function updateTotalsUI() {
            let totC = 0; let totP = 0;
            Object.values(cashAssignments).forEach(v => totC += v);
            Object.values(customCashAssignments).forEach(v => totC += v);
            Object.values(pointAssignments).forEach(v => totP += v);

            let orgEarn = parseInt(userData.earnings) || 0;
            let orgPts = parseInt(userData.points) || 0;

            let cText = document.getElementById('totCash');
            let pText = document.getElementById('totPts');
            let subBtn = document.getElementById('btnFinalize');

            cText.innerText = `₹${totC.toLocaleString()}`;
            pText.innerText = `${totP.toLocaleString()} PTS`;

            if(document.body.classList.contains('theme-vip')) cText.style.color = "#FFD700";

            let hasError = false;
            if (totC > orgEarn) { cText.classList.add('err'); hasError = true; } else { cText.classList.remove('err'); }
            if (totP > orgPts) { pText.classList.add('err'); hasError = true; } else { pText.classList.remove('err'); }

            if (hasError) {
                subBtn.disabled = true;
                subBtn.innerText = "Insufficient Funds";
                subBtn.style.background = "rgba(255,77,77,0.15)";
                subBtn.style.color = "var(--accent-danger)";
                subBtn.style.border = "1px solid var(--accent-danger)";
            } else {
                subBtn.disabled = false;
                subBtn.innerText = "Finalize Payouts";
                subBtn.style.background = ""; 
                subBtn.style.color = "";
                subBtn.style.border = "none";
            }
        }

        // --- STEP 4: SUBMIT BATCH RESOLUTION ---
        function submitResolution() {
            let hasAnyCash = Object.keys(cashAssignments).length > 0 || Object.keys(customCashAssignments).length > 0;
            if (!hasAnyCash && Object.keys(pointAssignments).length === 0) {
                showToast("No prizes or points assigned!", true); return;
            }

            if (!confirm("⚠️ Confirm Payouts?\n\nThis will deduct the totals from your wallet, credit the players, and permanently close this match.")) return;

            triggerHaptic();
            const btn = document.getElementById('btnFinalize');
            btn.innerHTML = "<i class='fa-solid fa-circle-notch fa-spin'></i> Processing Transaction...";
            btn.disabled = true;

            let cArr = []; 
            for (let team in cashAssignments) { cArr.push({name: team, amount: cashAssignments[team]}); }
            for (let team in customCashAssignments) { 
                let existing = cArr.find(x => x.name === team);
                if (existing) existing.amount += customCashAssignments[team];
                else cArr.push({name: team, amount: customCashAssignments[team]}); 
            }
            
            let pArr = []; 
            for (let team in pointAssignments) { pArr.push({name: team, points: pointAssignments[team]}); }

            let payload = {
                action: 'resolve_match_batch',
                match_id: activeMatchId,
                org_email: userData.email,
                cash_winners: cArr,
                point_winners: pArr
            };

            secureFetch(payload)
            .then(data => {
                if (data.status === 'success') {
                    let totC = 0; cArr.forEach(x => totC += x.amount);
                    let totP = 0; pArr.forEach(x => totP += x.points);
                    userData.earnings = (parseInt(userData.earnings) || 0) - totC;
                    userData.points = (parseInt(userData.points) || 0) - totP;
                    localStorage.setItem('tournyx_user', JSON.stringify(userData));

                    showToast("Match Closed & Payouts Sent!");
                    setTimeout(() => { window.location.href = 'profile.html'; }, 1500);
                } else {
                    showToast(data.message || "Transaction failed.", true);
                    btn.innerText = "Finalize Payouts"; btn.disabled = false;
                }
            })
            .catch(err => {
                showToast("Network Error. Please verify in dashboard.", true);
                setTimeout(() => { window.location.href = 'profile.html'; }, 2000);
            });
        }
    </script>
</body>
</html>
