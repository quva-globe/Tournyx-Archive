<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://tournyx.in/favicon.ico" sizes="any">
    <link rel="icon" href="https://tournyx.in/favicon.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="https://tournyx.in/apple-touch-icon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login / Register - Tournyx Esports</title>
    <meta name="description" content="Sign in to your Tournyx account to join premium BGMI and Free Fire esports tournaments, manage your clan, and withdraw your winnings.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- GLOBAL VARIABLES --- */
        :root {
            --primary-bg: #070311;
            --card-bg: rgba(15, 5, 25, 0.7);
            --input-bg: rgba(5, 2, 12, 0.8);
            --card-border: rgba(0, 242, 255, 0.25);
            --accent-cyan: #00f2ff;
            --accent-purple: #bd00ff;
            --accent-green: #00ff7f;
            --accent-orange: #ff9900;
            --accent-gradient: linear-gradient(135deg, #bd00ff, #00f2ff);
            --text-main: #ffffff;
            --font-head: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }

        body {
            background-color: var(--primary-bg); color: var(--text-main);
            font-family: var(--font-body); min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            overflow: hidden; position: relative; padding: 0;
        }

        /* --- HARDWARE ACCELERATED VIDEO & BACKGROUND --- */
        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -4; filter: brightness(0.75);
            background: radial-gradient(circle at 50% 30%, #15062e 0%, #070311 100%);
        }
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 40%, rgba(7,3,17,0.8) 100%); z-index: -3;
        }
        #particles-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; transform: translateZ(0); pointer-events: none;
        }

        /* SIMPLE VOLUME TOGGLE */
        .vol-btn {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.5);
            border: 1px solid #555; color: white; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; backdrop-filter: blur(5px); transition: 0.2s;
        }
        .vol-btn:active { transform: scale(0.9); }

        /* LOGGED IN PROFILE CORNER */
        .top-profile-corner {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.6);
            padding: 5px 15px 5px 5px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); cursor: pointer; transition: 0.3s;
            animation: fadeInDown 1s ease forwards;
        }
        .top-profile-corner:active { transform: scale(0.95); }
        .top-profile-corner img {
            width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--accent-cyan);
            object-fit: cover; box-shadow: 0 0 10px rgba(0,242,255,0.4);
        }
        .top-profile-corner .user-name {
            font-family: var(--font-head); font-size: 0.85rem; font-weight: bold; color: white;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .hidden { display: none !important; }

        /* --- AAA GAME ENTRY SCREEN (NO BOX) --- */
        .game-entry-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            width: 100%; height: 100vh; padding: 10vh 20px 8vh; position: relative; z-index: 10;
        }

        .center-logo-area {
            display: flex; flex-direction: column; align-items: center;
            animation: cinematicZoomIn 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .center-logo-area img {
            width: 130px; height: 130px; border-radius: 25px; object-fit: cover;
            border: 2px solid rgba(0, 242, 255, 0.6);
            box-shadow: 0 0 30px rgba(189, 0, 255, 0.6), inset 0 0 20px rgba(0, 242, 255, 0.4);
            animation: floatLogo 4s ease-in-out infinite; margin-bottom: 15px;
            background: var(--primary-bg);
        }
        @keyframes cinematicZoomIn { 0% { transform: scale(0.8); opacity: 0; filter: blur(10px); } 100% { transform: scale(1); opacity: 1; filter: blur(0); } }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); box-shadow: 0 0 30px rgba(189,0,255,0.6); } 50% { transform: translateY(-10px); box-shadow: 0 0 40px rgba(0,242,255,0.8); } }
        
        .app-name { 
            font-family: var(--font-head); font-size: 2.5rem; letter-spacing: 4px; font-weight: 900;
            background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 5px; text-shadow: 0 0 20px rgba(0,242,255,0.4);
        }

        /* BOTTOM HUD BUTTONS */
        .auth-buttons-container {
            display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px;
            animation: slideUpHUD 1s ease forwards;
        }
        @keyframes slideUpHUD { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .game-btn {
            width: 100%; padding: 15px; border-radius: 12px; font-family: var(--font-head);
            font-size: 0.95rem; font-weight: 900; letter-spacing: 1px; cursor: pointer; transition: 0.2s;
            text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px;
            position: relative; overflow: hidden; border: none; z-index: 1;
        }
        .game-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-25deg); transition: 0.5s; z-index: -1;
        }
        .game-btn:hover::after { left: 150%; transition: 0.7s; }
        .game-btn:active { transform: scale(0.96); }

        .login-btn { background: var(--accent-gradient); color: white; box-shadow: 0 5px 20px rgba(189,0,255,0.5); }
        .register-btn { background: rgba(0,0,0,0.6); color: white; border: 1px solid var(--accent-cyan); box-shadow: inset 0 0 15px rgba(0,242,255,0.2); backdrop-filter: blur(10px); }
        
        .org-btn { 
            background: rgba(255, 153, 0, 0.15); color: var(--accent-orange); 
            border: 1px solid var(--accent-orange); box-shadow: 0 0 20px rgba(255,153,0,0.4), inset 0 0 10px rgba(255,153,0,0.2);
            backdrop-filter: blur(10px); animation: orgGlow 2s infinite alternate; margin-top: 5px;
        }
        @keyframes orgGlow { from { box-shadow: 0 0 15px rgba(255,153,0,0.3); } to { box-shadow: 0 0 30px rgba(255,153,0,0.6); border-color: #ffd700; color: #ffd700; } }

        /* TAP TO START ENGINE */
        .tap-to-start {
            font-family: var(--font-head); font-size: 1.3rem; font-weight: 900; color: white;
            letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
            text-shadow: 0 0 15px var(--accent-cyan), 0 0 30px var(--accent-purple);
            animation: pulseTap 1.5s infinite alternate; padding: 20px; width: 100%; text-align: center;
        }
        @keyframes pulseTap { 0% { opacity: 0.4; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1.05); } }

        /* TOUCH RIPPLE FX */
        .ripple {
            position: absolute; border-radius: 50%; transform: scale(0);
            animation: ripple-anim 0.6s linear; background: rgba(0, 242, 255, 0.4); z-index: 9999; pointer-events: none;
        }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

        /* LEGAL FOOTER CREDITS */
        .credits-footer {
            position: fixed; bottom: 10px; width: 100%; text-align: center;
            z-index: 5; pointer-events: none; display: flex; flex-direction: column; gap: 4px;
        }
        .data-notice { font-size: 0.65rem; color: #00ff7f; font-family: var(--font-body); font-weight: bold; letter-spacing: 0.5px; text-shadow: 0 0 5px rgba(0,255,127,0.5);}
        .copyrights { font-size: 0.55rem; color: #888; font-family: var(--font-body); letter-spacing: 0.5px; }
        .quva-credit { font-size: 0.65rem; color: #aaa; font-family: var(--font-body); letter-spacing: 1px; margin-top: 2px;}
        .neon-quva { font-family: var(--font-head); font-weight: 900; color: white; text-shadow: 0 0 8px #00f2ff, 0 0 15px #bd00ff; letter-spacing: 2px;}

        /* --- MODALS (UNIVERSAL SIZING & Z-INDEX FIX) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); z-index: 5000; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
            opacity: 0; transition: opacity 0.3s ease; padding: 15px;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            width: 100%; max-width: 400px; border-radius: 20px; padding: 25px 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9), inset 0 0 25px rgba(0,242,255,0.15);
            transform: scale(0.9); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh; display: flex; flex-direction: column; position: relative;
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
        }
        .modal-overlay.active .modal-card { transform: scale(1); }

        .close-modal { position: absolute; top: 15px; right: 18px; font-size: 1.3rem; color: #888; cursor: pointer; transition: 0.3s; z-index: 100; }
        .close-modal:hover { color: var(--accent-red); transform: rotate(90deg) scale(1.1); }

        .modal-title { font-family: var(--font-head); font-size: 1.25rem; color: white; margin-bottom: 20px; text-align: center; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 10px currentColor; flex-shrink: 0;}

        /* ORGANIZER PORTAL MODAL GLOW */
        #orgModal .modal-card {
            background: rgba(20, 5, 0, 0.75); border: 1px solid rgba(255, 153, 0, 0.6);
            box-shadow: 0 15px 40px rgba(0,0,0,0.9), inset 0 0 40px rgba(255, 153, 0, 0.25);
        }

        /* --- MULTI-STEP SLIDER --- */
        .slider-window { width: 100%; flex: 1; overflow: hidden; position: relative; min-height: 280px; }
        .slider-track { display: flex; width: 300%; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); height: 100%; align-items: flex-start;}
        .slide-step { width: 33.333%; padding: 5px; flex-shrink: 0; box-sizing: border-box; overflow-y: auto; max-height: 100%; scrollbar-width: none; }
        
        .step-indicators { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-shrink: 0;}
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: 0.3s; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }
        .step-dot.active { background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); transform: scale(1.3); }

        /* --- FORMS & INPUTS (REDUCED SIZE FOR NO OVERFLOW) --- */
        .input-wrapper { margin-bottom: 12px; width: 100%; }
        .input-group { position: relative; width: 100%; }
        /* FIX: Pointer events none allows clicks to pass through to the select field */
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #666; transition: 0.3s; pointer-events: none; font-size: 0.85rem; z-index: 3;}
        
        .form-control {
            width: 100%; background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            padding: 12px 12px 12px 40px; color: white; font-family: var(--font-body); font-size: 0.85rem; outline: none; transition: 0.2s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5); appearance: none; -webkit-appearance: none; position: relative; z-index: 2;
        }
        
        select.form-control { cursor: pointer; padding-right: 30px; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23666666%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 12px top 50%; background-size: 10px auto; background-color: var(--input-bg);}
        select.form-control option { background: var(--primary-bg); color: white; }
        
        .form-control:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3), inset 0 0 8px rgba(0,0,0,0.6); }
        #orgModal .form-control:focus { border-color: var(--accent-orange); box-shadow: 0 0 10px rgba(255, 153, 0, 0.3); }
        
        .form-control:focus + .input-icon, .form-control:not(:placeholder-shown) + .input-icon, .input-group:focus-within .input-icon { color: var(--accent-cyan); filter: drop-shadow(0 0 5px var(--accent-cyan)); }
        #orgModal .input-group:focus-within .input-icon { color: var(--accent-orange); filter: drop-shadow(0 0 5px var(--accent-orange)); }
        
        .form-control:read-only { opacity: 0.6; pointer-events: none; }

        .pwd-toggle { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #666; cursor: pointer; transition: 0.3s; font-size: 0.9rem; z-index: 10;}
        .pwd-toggle:active { transform: translateY(-50%) scale(0.9); }

        .info-box { background: rgba(0, 242, 255, 0.05); border-left: 2px solid var(--accent-cyan); color: #bbb; font-size: 0.65rem; padding: 6px 10px; margin-top: 6px; border-radius: 0 6px 6px 0; line-height: 1.3; }

        /* --- OTP UI --- */
        .flex-row { display: flex; gap: 8px; }
        .otp-btn { background: rgba(189,0,255,0.15); border: 1px solid var(--accent-purple); color: var(--accent-purple); border-radius: 10px; font-family: var(--font-head); font-size: 0.75rem; font-weight: bold; cursor: pointer; transition: 0.3s; padding: 0 12px; text-transform: uppercase; white-space: nowrap; height: 100%;}
        .otp-btn:active { transform: scale(0.95); background: var(--accent-purple); color: #fff; }
        .verify-btn { position: absolute; right: 5px; top: 5px; bottom: 5px; background: var(--accent-green); border: none; border-radius: 8px; color: #000; font-weight: 800; padding: 0 12px; cursor: pointer; font-family: var(--font-head); font-size: 0.75rem; transition: 0.2s; z-index: 10;}
        .verify-btn:active { transform: scale(0.95); }
        .verify-btn.verified { background: rgba(0, 255, 127, 0.1); border: 1px solid var(--accent-green); color: var(--accent-green); cursor: default; }

        /* TERMS LINK & CHECKBOX */
        .custom-checkbox-container { display: flex; align-items: flex-start; gap: 10px; margin-top: 8px; margin-bottom: 15px; cursor: pointer; font-size: 0.75rem; color: #aaa; text-align: left; user-select: none; line-height: 1.3; }
        .custom-checkbox-container input { display: none; }
        .checkmark { min-width: 18px; height: 18px; border: 1.5px solid #555; border-radius: 4px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); margin-top: 1px; transition: 0.2s;}
        .custom-checkbox-container input:checked + .checkmark { border-color: var(--accent-green); background: rgba(0, 255, 127, 0.15); box-shadow: 0 0 10px rgba(0, 255, 127, 0.4); }
        .custom-checkbox-container input:checked + .checkmark::after { content: '\f00c'; font-family: "Font Awesome 6 Free"; font-weight: 900; color: var(--accent-green); font-size: 10px; }
        .terms-link { color: var(--accent-cyan); text-decoration: none; font-weight: bold; }

        /* SLIDER NAVIGATION BUTTONS */
        .slide-nav-row { display: flex; gap: 8px; margin-top: 10px; }
        .slide-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-family: var(--font-head); font-size: 0.85rem; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; gap: 6px;}
        .slide-btn.next { background: var(--accent-gradient); color: white; }
        .slide-btn.back { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: #aaa; }
        .slide-btn:active { transform: scale(0.96); }

        /* --- TOAST ALERTS --- */
        #customToast {
            position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 77, 77, 0.95); color: white; font-family: var(--font-head); font-size: 0.75rem; font-weight: bold;
            padding: 10px 20px; border-radius: 50px; z-index: 9999;
            box-shadow: 0 5px 20px rgba(255, 77, 77, 0.6); opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 8px; white-space: nowrap; backdrop-filter: blur(10px);
        }
        #customToast.show { bottom: 35px; opacity: 1; }
        #customToast.success { background: rgba(0, 255, 127, 0.95); color: black; box-shadow: 0 5px 20px rgba(0, 255, 127, 0.6); }

        /* CINEMATIC ARENA ENTRY */
        .arena-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #040108; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .arena-overlay.active { display: flex; animation: fadeInBg 0.3s forwards; }
        .arena-text { font-family: var(--font-head); font-size: 1.8rem; color: #fff; font-weight: 900; letter-spacing: 4px; text-shadow: 0 0 20px rgba(0, 242, 255, 0.6); text-align: center; text-transform: uppercase; animation: cinematicEntry 2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes fadeInBg { from { opacity: 0; } to { opacity: 1; } }
        @keyframes cinematicEntry { 0% { transform: scale(0.8); opacity: 0; filter: blur(10px); } 20% { transform: scale(1); opacity: 1; filter: blur(0); letter-spacing: 4px; } 80% { transform: scale(1.05); opacity: 1; filter: blur(0); letter-spacing: 6px; } 100% { transform: scale(1.3); opacity: 0; filter: blur(15px); letter-spacing: 10px; } }

        /* DESKTOP EXCLUSIVE ALIGNMENT */
        @media (min-width: 769px) {
            .game-entry-screen { align-items: flex-end; padding-right: 10%; }
        }
        
    </style>
</head>
<body id="mainBody">

    <video loop playsinline class="video-bg" id="bgVideo"></video>
    <div class="bg-overlay"></div>
    <canvas id="particles-canvas"></canvas>

    <button id="volToggle" class="vol-btn simple-vol" onclick="toggleVolume()">
        <i id="volIcon" class="fa-solid fa-volume-xmark"></i>
    </button>

    <div id="loggedInProfile" class="top-profile-corner hidden" onclick="quickLogin()">
        <img id="loggedInAvatar" src="" alt="Avatar">
        <span id="loggedInName" class="user-name"></span>
    </div>

    <div class="game-entry-screen" id="entryScreen">
        
        <div class="center-logo-area">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEipVmqyUEA22VpntZdPCHuXoO_Rjco_cRaNl5CyFa-eehdtgXnHe6JoD8a5svxJRJYZfv_yXwww10T2cL2PHTiXLK-J-nWC1swmMs5RDxGVM8FBSlJORaRiX4YiD8gL8SyM4X1tRyQn_v8MsqQvbU4uEyHEU0qaySP1STWHaBEYuWKyF3-6QovSqJR-8xU/s1024/1000093705.png" alt="Tournyx Logo">
            <h1 class="app-name">TOURNYX</h1>
        </div>
        
        <div id="authButtons" class="auth-buttons-container">
            <button class="game-btn login-btn" onclick="openModal('loginModal')">
                <i class="fa-solid fa-right-to-bracket"></i> PLAYER LOGIN
            </button>
            <button class="game-btn register-btn" onclick="openModal('signupModal')">
                <i class="fa-solid fa-user-plus"></i> CREATE ACCOUNT
            </button>
            <button class="game-btn org-btn" onclick="openModal('orgModal')">
                <i class="fa-solid fa-crown"></i> ORGANIZER PORTAL
            </button>
        </div>
        
        <div id="tapToStart" class="tap-to-start hidden" onclick="quickLogin()">
            TAP TO ENTER ARENA
        </div>
    </div>

    <div class="credits-footer">
        <div class="data-notice"><i class="fa-solid fa-cloud-arrow-down"></i> Video cached. Zero data usage.</div>
        <div class="copyrights">© Tournyx Esports private limited | © KRAFTON | © Garena</div>
        <div class="quva-credit">Powered by <span class="neon-quva">QUVA</span></div>

    <div id="customToast"><i class="fa-solid fa-circle-exclamation"></i> <span id="toastMsg">Alert</span></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyqqTpgaflxKJ9xH0jq7mJ_jLzcoNhas3gNo0h5gvoa_6r5Ae9NFxJAJp7ZoYNnMRKl/exec';

        // --- GLOBAL TOUCH RIPPLE ENGINE (ESPORTS FEEL) ---
        document.body.addEventListener('click', function (e) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            document.body.appendChild(ripple);
            ripple.style.left = `${e.clientX - 20}px`;
            ripple.style.top = `${e.clientY - 20}px`;
            setTimeout(() => { ripple.remove(); }, 600);
        });

        function doHaptic() { if(navigator.vibrate) navigator.vibrate(15); }

        // --- BACKGROUND VIDEO CACHING & AUDIO ENGINE ---
        async function loadVideoBackground() {
            const videoUrl = 'https://tournyx.in/FFBGMICODTRAILER.mp4'; // Replace with actual Tournyx Video URL
            const videoElement = document.getElementById('bgVideo');
            if(!videoUrl || videoUrl === '') return;
            
            try {
                const cache = await caches.open('tournyx-video-cache');
                let response = await cache.match(videoUrl);
                
                if (!response) {
                    response = await fetch(videoUrl);
                    if (response.ok) cache.put(videoUrl, response.clone());
                }
                
                if (response.ok) {
                    const blob = await response.blob();
                    videoElement.src = URL.createObjectURL(blob);
                }
            } catch (e) {
                videoElement.src = videoUrl; // Failsafe
            }

            // Audio Auto-play Logic (Try Unmuted First)
            videoElement.muted = false;
            let playPromise = videoElement.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    // Browser blocked unmuted auto-play. Fallback to muted.
                    videoElement.muted = true;
                    videoElement.play();
                    document.getElementById('volIcon').className = 'fa-solid fa-volume-xmark';
                }).then(() => {
                    if(!videoElement.muted) document.getElementById('volIcon').className = 'fa-solid fa-volume-high';
                });
            }
        }
        
        function toggleVolume() {
            doHaptic();
            const video = document.getElementById('bgVideo');
            const icon = document.getElementById('volIcon');
            if(video.muted) {
                video.muted = false;
                icon.className = 'fa-solid fa-volume-high';
            } else {
                video.muted = true;
                icon.className = 'fa-solid fa-volume-xmark';
            }
        }
        loadVideoBackground();

        // --- SECURE API FETCH WRAPPER ---
        async function secureFetch(payload) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (error) { throw error; }
        }

        function showToast(msg, isSuccess = false) {
            doHaptic();
            const t = document.getElementById('customToast');
            document.getElementById('toastMsg').innerText = msg;
            t.className = isSuccess ? 'success show' : 'show';
            setTimeout(() => { t.className = t.className.replace('show', ''); }, 3500);
        }

        // --- SHOW/HIDE PASSWORD TOGGLE ---
        function togglePwd(inputId, icon, isOrg) {
            doHaptic();
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
                icon.style.color = isOrg ? "var(--accent-orange)" : "var(--accent-cyan)";
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
                icon.style.color = isOrg ? "var(--accent-orange)" : "#666";
            }
        }

        // --- EMAIL OTP LOGIC ---
        let isEmailVerified = false;

        async function sendOtp() {
            doHaptic();
            const emailInput = document.getElementById('regEmail');
            let email = emailInput.value.trim();
            if(!email.includes("@") || !email.includes(".")) { showToast("Enter a valid email address."); return; }
            
            const btn = document.getElementById('btnSendOtp');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
            btn.disabled = true;

            try {
                const result = await secureFetch({ action: 'send_email_otp', email: email });
                if (result.status === 'success') {
                    document.getElementById('otpGroup').style.display = 'flex';
                    document.getElementById('regOtp').setAttribute('required', 'true');
                    btn.innerHTML = `SENT <i class="fa-solid fa-check"></i>`;
                    showToast("OTP Sent! Check your inbox/spam.", true);
                } else {
                    btn.innerHTML = `SEND OTP`; btn.disabled = false;
                    showToast("Error: " + result.data); 
                }
            } catch (err) {
                btn.innerHTML = `SEND OTP`; btn.disabled = false;
                showToast("Network error connecting to mail server.");
            }
        }

        function verifyOtp() {
            doHaptic();
            const otpInput = document.getElementById('regOtp');
            const otp = otpInput.value.trim();
            if(otp.length < 4) { showToast("Enter valid 4-digit OTP"); return; }

            const btn = document.getElementById('btnVerifyOtp');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;

            setTimeout(() => {
                btn.innerHTML = `<i class="fa-solid fa-check-double"></i> VERIFIED`;
                btn.classList.add('verified'); btn.disabled = true;
                otpInput.readOnly = true; document.getElementById('regEmail').readOnly = true;
                isEmailVerified = true;
            }, 800);
        }

        function unlockEmailInput() {
            document.getElementById('regEmail').readOnly = false;
            isEmailVerified = false;
            const btn = document.getElementById('btnVerifyOtp');
            btn.innerHTML = `VERIFY`; btn.classList.remove('verified'); btn.disabled = false;
            const otpInput = document.getElementById('regOtp');
            otpInput.readOnly = false; otpInput.value = "";
        }

        // --- PHONE NUMBER STRIP & LOCK LOGIC ---
        const phoneInput = document.getElementById('regPhone');
        phoneInput.addEventListener('input', function(e) {
            if (!this.value.startsWith('+91 ')) this.value = '+91 ';
            let numbers = this.value.substring(4).replace(/\D/g, '');
            if (numbers.length > 10) numbers = numbers.substring(0, 10);
            this.value = '+91 ' + numbers;
        });
        phoneInput.addEventListener('keydown', function(e) {
            if ((e.key === 'Backspace' || e.key === 'Delete') && this.selectionStart <= 4 && this.selectionEnd <= 4) e.preventDefault();
        });

        // --- MULTI-STEP SLIDER LOGIC ---
        let currentStep = 1;
        function updateDots() {
            document.querySelectorAll('.step-dot').forEach((dot, idx) => {
                dot.classList.toggle('active', idx + 1 === currentStep);
            });
        }
        
        function nextSlide(step) {
            doHaptic();
            // Validation Before Moving Forward
            if (step === 1) {
                if(!isEmailVerified) { showToast("Please verify email via OTP to continue."); return; }
                if(document.getElementById('regPwd').value.length < 6) { showToast("Password must be at least 6 characters."); return; }
                const phoneDigits = document.getElementById('regPhone').value.substring(4).replace(/\D/g, '');
                if(phoneDigits.length !== 10) { showToast("Enter a valid 10-digit phone number."); return; }
            }
            if (step === 2) {
                if(document.getElementById('regGame').value === "") { showToast("Please select a game."); return; }
                if(document.getElementById('regUser').value.trim() === "") { showToast("Display name is required."); return; }
                if(document.getElementById('regIgn').value.trim() === "") { showToast("In-Game Name is required."); return; }
                if(document.getElementById('regUid').value.trim() === "") { showToast("Game UID is required."); return; }
            }

            currentStep = step + 1;
            document.getElementById('sliderTrack').style.transform = `translateX(-${(currentStep - 1) * 33.333}%)`;
            updateDots();
        }

        function prevSlide(step) {
            doHaptic();
            currentStep = step - 1;
            document.getElementById('sliderTrack').style.transform = `translateX(-${(currentStep - 1) * 33.333}%)`;
            updateDots();
        }

        // High-Quality Anime Avatar Engine
        function formatImageUrl(url, fallbackName) {
            let safeName = fallbackName || "User";
            let animeFallback = `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(safeName)}&size=150&backgroundColor=0a0520,0d0825`;
            
            if (!url) return animeFallback;
            let strUrl = String(url).trim().replace(/[\r\n\t]/g, '');
            if (strUrl.length < 5) return animeFallback;
            if (strUrl.startsWith('data:image') || strUrl.includes('imgbb') || strUrl.includes('ibb.co')) return strUrl;
            if (strUrl.includes('drive.google.com/file/d/')) {
                let id = strUrl.split('/d/')[1].split('/')[0];
                return `https://drive.google.com/uc?export=view&id=${id}`; 
            }
            return strUrl;
        }

        // --- SMART ROUTING & SESSION LOGIC ---
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref') || urlParams.get('code');
            const tabParam = urlParams.get('tab');

            // Check if already logged in
            let user = JSON.parse(localStorage.getItem('tournyx_user'));
            if(user && user.email) {
                document.getElementById('authButtons').classList.add('hidden');
                document.getElementById('tapToStart').classList.remove('hidden');
                document.getElementById('loggedInProfile').classList.remove('hidden');
                
                let displayName = user.ign || user.username || "Player";
                document.getElementById('loggedInName').innerText = displayName;
                document.getElementById('loggedInAvatar').src = formatImageUrl(user.avatar, displayName);
                
                // Clicking anywhere on the background triggers login
                document.getElementById('mainBody').addEventListener('click', function(e) {
                    if(!document.querySelector('.modal-overlay.active')) quickLogin();
                });
            }

            if (refCode) { 
                setTimeout(() => {
                    openModal('signupModal'); 
                    document.getElementById('refInput').value = refCode;
                    document.getElementById('refInput').style.borderColor = "var(--accent-green)";
                    document.getElementById('refInput').style.boxShadow = "0 0 15px rgba(0,255,127,0.4)";
                }, 800); 
            }
            if (tabParam === 'organizer') openModal('orgModal');
        });

        // --- TAP TO START QUICK LOGIN ---
        function quickLogin() {
            doHaptic();
            let user = JSON.parse(localStorage.getItem('tournyx_user'));
            if(user) triggerArenaEntry(user, 'index.html');
        }

        // --- MODAL LOGIC ---
        function openModal(id) {
            doHaptic();
            closeModals(); 
            document.getElementById(id).classList.add('active');
        }
        
        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
            currentStep = 1;
            document.getElementById('sliderTrack').style.transform = `translateX(0%)`;
            updateDots();
        }

        // --- ANIMATION OVERLAY LOGIC ---
        function triggerArenaEntry(user, redirectUrl) {
            if(navigator.vibrate) navigator.vibrate([20, 50, 20]);
            closeModals();
            localStorage.setItem('tournyx_user', JSON.stringify(user));
            const loader = document.getElementById('arenaLoader');
            loader.classList.add('active');
            setTimeout(() => { window.location.href = redirectUrl; }, 1900);
        }

        function btnLoading(btnId, text) {
            doHaptic();
            const btn = document.getElementById(btnId);
            btn.dataset.original = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> ${text}`;
            btn.disabled = true;
        }
        function btnReset(btnId) {
            const btn = document.getElementById(btnId);
            btn.innerHTML = btn.dataset.original;
            btn.disabled = false;
        }

        // PLAYER SIGNUP (FINAL SUBMISSION & AUTO-LOGIN FLOW)
        document.getElementById('playerSignupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Final Validation for Slide 3
            if(!document.getElementById('termsCheck').checked) { showToast("You must agree to the Terms & Conditions."); return; }
            if(document.getElementById('regState').value === "") { showToast("Please select a state."); return; }
            if(document.getElementById('regCity').value.trim() === "") { showToast("Please enter your city."); return; }

            const phoneVal = document.getElementById('regPhone').value;
            const phoneDigits = phoneVal.substring(4).replace(/\D/g, '');

            btnLoading('btnSignup', 'CREATING ACCOUNT...');

            try {
                const formData = new FormData(e.target);
                const rawData = Object.fromEntries(formData);

                const payload = {
                    action: 'signup',
                    username: rawData.username,
                    ign: rawData.ign,
                    uid: rawData.uid,
                    game: rawData.game,
                    state: rawData.state,
                    city: rawData.city,
                    phone: phoneDigits,      
                    email: rawData.email,
                    password: rawData.password,
                    referral: rawData.referral || "", 
                    otp: rawData.otp,         
                    role: 'player'
                };

                const result = await secureFetch(payload);
                
                if(result.status === 'success') {
                    if(navigator.vibrate) navigator.vibrate(30);
                    showToast("Account Created! Securely entering arena...", true);
                    
                    // Auto-fill logic & Transition to Login
                    let safeEmail = rawData.email;
                    let safePwd = rawData.password;
                    
                    setTimeout(() => {
                        closeModals();
                        openModal('loginModal');
                        document.getElementById('loginEmail').value = safeEmail;
                        document.getElementById('loginPwd').value = safePwd;
                        // Auto-trigger login click
                        setTimeout(() => document.getElementById('btnLogin').click(), 500);
                    }, 1500);
                    
                } else {
                    showToast(result.data);
                    if (result.data.toLowerCase().includes("email already registered")) unlockEmailInput();
                }
            } catch (err) { 
                showToast("Connection Error or system unavailable."); 
            } finally { 
                btnReset('btnSignup'); 
            }
        });

        // PLAYER LOGIN
        document.getElementById('playerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            btnLoading('btnLogin', 'AUTHENTICATING...');

            const email = e.target.email.value;
            const password = e.target.password.value;
            
            try {
                const result = await secureFetch({ action: 'login', email: email, password: password });
                
                if (result.status === 'success') {
                    if (result.data.role === 'organizer') {
                        showToast("Organizers must log in through the Organizer Portal.");
                    } else {
                        triggerArenaEntry(result.data, 'index.html');
                    }
                } else { showToast("Invalid Credentials"); }
            } catch (err) { showToast("Network Error."); }
            finally { btnReset('btnLogin'); }
        });

        // ORGANIZER LOGIN
        document.getElementById('organizerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            btnLoading('btnOrgLogin', 'VERIFYING...');

            const email = e.target.email.value;
            const password = e.target.password.value;
            
            try {
                const result = await secureFetch({ action: 'login', email: email, password: password });
                
                if (result.status === 'success') {
                    if (result.data.role === 'organizer') {
                        triggerArenaEntry(result.data, 'profile.html');
                    } else {
                        showToast("Players must log in through the Player Portal.");
                    }
                } else { showToast("Invalid Admin Credentials"); }
            } catch (err) { showToast("System Error."); }
            finally { btnReset('btnOrgLogin'); }
        });

        // --- PARTICLES ENGINE ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        class P {
            constructor(){ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.vx=Math.random()*0.5-0.25; this.vy=Math.random()*0.5-0.25; this.size=Math.random()*2+0.5; }
            u(){ this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>canvas.width)this.vx=-this.vx; if(this.y<0||this.y>canvas.height)this.vy=-this.vy; }
            d(){ ctx.fillStyle='rgba(0,242,255,0.3)'; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); }
        }
        for(let i=0;i<40;i++) particles.push(new P());
        function anim(){ ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.u();p.d()}); requestAnimationFrame(anim); }
        anim();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

    </script>
    <script>
    function tournyxOneSignalSetup() {
        let user = JSON.parse(localStorage.getItem('tournyx_user'));
        if (user && user.email && typeof median !== 'undefined' && median.onesignal) {
            let cleanEmail = user.email.toLowerCase().trim();
            if (median.onesignal.login) {
                median.onesignal.login({ externalId: cleanEmail });
                if (median.onesignal.user && median.onesignal.user.addEmail) median.onesignal.user.addEmail({ email: cleanEmail });
            } else if (median.onesignal.setExternalUserId) {
                median.onesignal.setExternalUserId({ externalId: cleanEmail });
                if (median.onesignal.setEmail) median.onesignal.setEmail({ email: cleanEmail });
            }
            let tagData = { "user_email": cleanEmail, "user_status": "active" };
            if (median.onesignal.tags && median.onesignal.tags.set) median.onesignal.tags.set(tagData);
            else if (median.onesignal.sendTags) median.onesignal.sendTags(tagData);
        }
    }
    document.addEventListener("median_library_ready", tournyxOneSignalSetup);
    document.addEventListener("DOMContentLoaded", tournyxOneSignalSetup);
    </script>
