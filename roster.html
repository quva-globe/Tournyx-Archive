<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Organizer Portal | Tournyx</title>
    
    <link rel="icon" href="https://tournyx.in/favicon.ico" sizes="any">
    <link rel="icon" href="https://tournyx.in/favicon.png" type="image/png" sizes="192x192">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Using the reliable bundled version of html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* --- GLOBAL VARIABLES --- */
        :root {
            --primary-bg: #070311;
            --card-bg: rgba(15, 7, 25, 0.85);
            --card-border: rgba(0, 242, 255, 0.2);
            --accent-cyan: #00f2ff;
            --accent-purple: #bd00ff;
            --accent-green: #00ff7f;
            --accent-orange: #ff9900;
            --accent-gradient: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            --font-head: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-body);
            background-color: var(--primary-bg);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            padding: 40px 15px; 
        }

        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 0%, #15062e 0%, #070311 100%); pointer-events: none; }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 35px 25px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 500px;
            border: 1px solid var(--card-border);
            box-shadow: 0 15px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 242, 255, 0.05);
            animation: slideUpGlow 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            margin: auto;
        }

        @keyframes slideUpGlow { 
            0% { opacity: 0; transform: translateY(30px) scale(0.98); } 
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }

        /* --- LOGO & HEADERS --- */
        .logo-container { text-align: center; margin-bottom: 25px; }
        .logo-container img { width: 55px; height: 55px; border-radius: 50%; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); border: 2px solid rgba(0,242,255,0.4); margin-bottom: 10px; animation: floatLogo 3s ease-in-out infinite;}
        
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); box-shadow: 0 0 30px rgba(189, 0, 255, 0.6); border-color: rgba(189, 0, 255, 0.6);}
        }

        .logo-text { font-family: var(--font-head); font-size: 1.5rem; font-weight: 900; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2px; }
        .tagline { color: #888; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; font-family: var(--font-head); font-weight: bold; }

        /* --- INPUTS --- */
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group i { position: absolute; left: 16px; bottom: 12px; color: #666; font-size: 1rem; transition: 0.3s; z-index: 2; pointer-events: none;}
        label { display: block; font-size: 0.75rem; color: #aaa; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-head); font-weight: bold;}
        
        input, select {
            width: 100%; padding: 12px 15px 12px 45px; border-radius: 10px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1); color: white; font-family: var(--font-body); font-size: 0.9rem; font-weight: bold; box-sizing: border-box;
            transition: all 0.3s ease; outline: none; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); appearance: none;
        }
        select { padding-left: 15px; }
        input:focus, select:focus { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0,242,255,0.2), inset 0 0 10px rgba(0,0,0,0.5); background: rgba(0,0,0,0.7);}
        input:focus + i { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(0,242,255,0.5); transform: scale(1.1);}

        /* --- BUTTONS --- */
        .btn-primary {
            width: 100%; padding: 14px; border-radius: 10px; border: none;
            background: var(--accent-gradient); color: white; font-size: 0.95rem; font-weight: 900; font-family: var(--font-head);
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 5px 15px rgba(189, 0, 255, 0.4);
        }
        .btn-primary:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(189,0,255,0.4); }
        .btn-primary:disabled { background: #333; color: #777; cursor: not-allowed; box-shadow: none; transform: none; border: 1px solid #444;}
        
        .btn-secondary {
            background: rgba(0,242,255,0.1); border: 1px solid var(--accent-cyan); color: var(--accent-cyan);
            padding: 10px 15px; border-radius: 8px; font-family: var(--font-head); font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 6px; text-transform: uppercase;
        }
        .btn-secondary:hover { background: rgba(0,242,255,0.2); box-shadow: 0 0 15px rgba(0,242,255,0.3); }

        /* --- FORMAT SELECTOR --- */
        .format-grid { display: flex; gap: 10px; margin-bottom: 25px; }
        .format-btn {
            flex: 1; padding: 10px 0; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            color: #888; border-radius: 8px; cursor: pointer; transition: 0.3s;
            font-size: 0.8rem; font-family: var(--font-head); font-weight: bold; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .format-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .format-btn.active { background: rgba(0,242,255,0.15); border-color: var(--accent-cyan); color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0,242,255,0.3); transform: translateY(-2px); }

        /* --- GROUP SEEDING UI --- */
        .seeding-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .team-seed-list { max-height: 350px; overflow-y: auto; padding-right: 5px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px;}
        .team-seed-list::-webkit-scrollbar { display: block !important; width: 4px !important; }
        .team-seed-list::-webkit-scrollbar-thumb { background: var(--accent-purple); border-radius: 10px; }
        
        .seed-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .seed-name { font-family: var(--font-head); font-size: 0.85rem; font-weight: bold; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;}
        .seed-select { width: 140px; padding: 8px; font-size: 0.75rem; background: rgba(255,255,255,0.05); border-color: var(--accent-cyan); color: var(--accent-cyan); }

        /* --- MODERN LOADER --- */
        .loader-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7,3,17,0.95); border-radius: 20px; z-index: 20; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .cyber-circle { width: 50px; height: 50px; border: 3px dashed var(--accent-cyan); border-radius: 50%; animation: spin 2s linear infinite; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .cyber-inner { width: 25px; height: 25px; background: rgba(189,0,255,0.4); border-radius: 50%; box-shadow: 0 0 20px var(--accent-purple); animation: pulse 1s infinite alternate; }
        .loader-text { font-family: var(--font-head); color: white; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; font-size: 0.85rem;}
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.2); opacity: 1; } }

        /* --- TOAST STATUS --- */
        #customToast { visibility: hidden; min-width: 250px; background-color: var(--accent-cyan); color: #000; text-align: center; border-radius: 10px; padding: 12px; position: fixed; z-index: 5000; left: 50%; bottom: -50px; transform: translateX(-50%); font-family: var(--font-head); font-weight: bold; box-shadow: 0 5px 15px rgba(0,242,255,0.5); opacity: 0; transition: 0.4s; font-size: 0.85rem;}
        #customToast.show { visibility: visible; opacity: 1; bottom: 30px; }

        /* --- INVISIBLE PDF RENDER CONTAINER --- */
        /* This keeps the template in the DOM but perfectly hidden and ready for html2canvas */
        #pdfRenderWrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 800px; /* Fixed width for perfect rendering */
            z-index: -9999;
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
            height: 0; /* Prevents scrolling issues */
        }

        .pdf-container { background: #ffffff; color: #000000; padding: 30px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; width: 800px; box-sizing: border-box; }
        .pdf-header { text-align: center; border-bottom: 3px solid #bd00ff; padding-bottom: 20px; margin-bottom: 20px; }
        .pdf-logo { font-size: 24px; font-weight: 900; color: #070311; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .pdf-title { color: #8a2be2; margin: 10px 0 5px; font-size: 20px; text-transform: uppercase; }
        .pdf-meta { color: #555; font-size: 12px; margin: 0; }
        .pdf-team-box { margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        
        .pdf-team-head { background: #110822; padding: 10px 15px; margin: 0; font-size: 14px; color: white; border-bottom: 2px solid #00f2ff; display: flex; justify-content: space-between; align-items: center; font-family: 'Orbitron', sans-serif;}
        .pdf-group-tag { background: #bd00ff; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white;}
        
        .pdf-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .pdf-table th { background: #f8f9fa; padding: 8px 15px; text-align: left; color: #555; text-transform: uppercase; border-bottom: 1px solid #ddd; font-weight: bold;}
        .pdf-table td { padding: 8px 15px; border-bottom: 1px solid #eee; color: #000;}
        .pdf-table tr:last-child td { border-bottom: none; }
        .pdf-table .role-col { font-weight: bold; color: #8a2be2; }
        
        .pdf-footer { text-align: center; color: #aaa; font-size: 10px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="container">
        <div class="loader-overlay" id="mainLoader">
            <div class="cyber-circle"><div class="cyber-inner"></div></div>
            <div class="loader-text" id="loaderText">EXTRACTING DATA...</div>
        </div>

        <div class="logo-container">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg_20wCR-WBMpQmw3vxcYUf-vxIO1PYDJoQN_Sid3UDjA9tf0cuX0eH40jbzHoJad4cxbnjhPjqfCw1Z5V1LhgN9zFuIQC0fJjecTy3D9PFu5WjR2H1wHwTD1bUGnXY_NiApWn5gMs6velcQngSzKoP1yHzX0cVsFSUFM8zIefcbiPayY7680Kz0V0ZAAE/s1264/1000093706.png" alt="Tournyx Logo">
            <h1 class="logo-text">Tournyx</h1>
            <p class="tagline">Organizer Command</p>
        </div>

        <div id="stepFetch">
            <div class="input-group">
                <label>Tournament Match ID</label>
                <input type="text" id="matchId" placeholder="e.g., TX-12345" autocomplete="off">
                <i class="fa-solid fa-hashtag"></i>
            </div>
            <div class="input-group">
                <label>Organizer Email</label>
                <input type="email" id="email" placeholder="admin@tournyx.com" autocomplete="off">
                <i class="fa-solid fa-envelope"></i>
            </div>
            <button class="btn-primary" id="fetchBtn" onclick="processFetch(); triggerHaptic();">
                <i class="fa-solid fa-satellite-dish"></i> Connect to Server
            </button>
        </div>

        <div id="stepGroups" style="display: none;">
            <div class="seeding-header">
                <div>
                    <h3 style="font-family: var(--font-head); color: var(--accent-cyan); font-size: 1.1rem; text-transform: uppercase;">Bracket Seeding</h3>
                    <p style="font-size: 0.75rem; color: #888;">Assign teams to custom sub-lobbies.</p>
                </div>
                <button class="btn-secondary" onclick="autoGenerateGroups()"><i class="fa-solid fa-wand-magic-sparkles"></i> Auto-Seed</button>
            </div>
            
            <div class="input-group" style="display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 15px; background: rgba(0,242,255,0.05); padding: 10px; border-radius: 10px; border: 1px dashed var(--accent-cyan);">
                <div style="font-size: 0.8rem; color: var(--accent-cyan); font-weight: bold;"><i class="fa-solid fa-layer-group"></i> Detected Lobbies:</div>
                <div id="detectedLobbiesCount" style="font-family: var(--font-head); font-size: 1rem; color: white;">Loading...</div>
            </div>

            <div class="team-seed-list" id="teamSeedingList"></div>

            <button class="btn-primary" id="saveGroupsBtn" onclick="saveGroups(); triggerHaptic();">
                <i class="fa-solid fa-floppy-disk"></i> Save & Lock Brackets
            </button>
        </div>

        <div id="stepDownload" style="display: none;">
            <h3 style="font-family: var(--font-head); color: var(--accent-green); font-size: 1.1rem; text-transform: uppercase; text-align:center; margin-bottom:20px;">
                <i class="fa-solid fa-check-circle"></i> Roster Locked & Ready
            </h3>
            
            <label>Select Download Format</label>
            <div class="format-grid">
                <button class="format-btn active" onclick="selectFormat(this, 'pdf'); triggerHaptic();"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                <button class="format-btn" onclick="selectFormat(this, 'word'); triggerHaptic();"><i class="fa-solid fa-file-word"></i> Word</button>
                <button class="format-btn" onclick="selectFormat(this, 'txt'); triggerHaptic();"><i class="fa-solid fa-file-lines"></i> TXT</button>
            </div>

            <button class="btn-primary" id="downloadBtn" onclick="executeDownload(); triggerHaptic();">
                <i class="fa-solid fa-cloud-arrow-down"></i> Download Roster
            </button>
            
            <div style="text-align:center; margin-top:15px;">
                <span style="font-size:0.75rem; color:var(--accent-orange); font-family:var(--font-head); cursor:pointer;" onclick="editGroupsAgain(); triggerHaptic();"><i class="fa-solid fa-pen"></i> Edit Groups Again</span>
            </div>
        </div>
    </div>

    <div id="customToast">Notification</div>

    <!-- INVISIBLE PDF RENDER CONTAINER -->
    <div id="pdfRenderWrapper">
        <div id="docTemplate">
            <div class="pdf-container">
                <div class="pdf-header">
                    <h1 class="pdf-logo">TOURNYX ESPORTS</h1>
                    <h3 id="docTitle" class="pdf-title"></h3>
                    <p id="docMeta" class="pdf-meta"></p>
                </div>
                <div id="docContent"></div>
                <div class="pdf-footer">Official Cryptographic Roster generated by Tournyx Organizer Portal</div>
            </div>
        </div>
    </div>

    <script>
        // --- BACKGROUND ANIMATION ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let pArray = [];
        class P { constructor(){ this.x=Math.random()*canvas.width; this.y=Math.random()*canvas.height; this.s=Math.random()*2; } u(){ this.y-=0.5; if(this.y<0)this.y=canvas.height; } d(){ ctx.fillStyle='rgba(189,0,255,0.2)'; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); } }
        for(let i=0; i<40; i++) pArray.push(new P());
        function anim(){ ctx.clearRect(0,0,canvas.width,canvas.height); pArray.forEach(p=>{p.u();p.d()}); requestAnimationFrame(anim); }
        anim();

        function triggerHaptic() { if(navigator.vibrate) navigator.vibrate(30); }

        function showToast(msg, isError = false) {
            let t = document.getElementById("customToast");
            t.innerText = msg;
            t.style.backgroundColor = isError ? "#ff4d4d" : "var(--accent-cyan)";
            t.style.color = isError ? "white" : "#000";
            t.className = "show";
            setTimeout(() => { t.className = t.className.replace("show", ""); }, 3500);
        }

        const API_URL = "https://script.google.com/macros/s/AKfycbyqqTpgaflxKJ9xH0jq7mJ_jLzcoNhas3gNo0h5gvoa_6r5Ae9NFxJAJp7ZoYNnMRKl/exec";
        
        let selectedFormat = 'pdf';
        let currentRosterData = null; 
        let customGroupNames = []; 

        function selectFormat(btn, format) {
            document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedFormat = format;
        }

        // --- SECURE API FETCH WRAPPER ---
        async function secureFetch(payload) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (error) {
                console.error("Fetch Error:", error);
                throw error;
            }
        }

        // --- STEP 1: FETCH DATA & REPAIR ENGINE ---
        async function processFetch() {
            const matchId = document.getElementById('matchId').value.trim();
            const email = document.getElementById('email').value.trim();
            const loader = document.getElementById('mainLoader');
            const lText = document.getElementById('loaderText');

            if (!matchId || !email) { showToast('⚠️ Enter Match ID and Email.', true); return; }

            loader.style.display = 'flex';
            lText.innerText = 'EXTRACTING DATA...';

            try {
                const result = await secureFetch({ action: 'get_roster_pdf_data', match_id: matchId, email: email });

                if (result.status === "success") {
                    currentRosterData = result.data;
                    
                    // --- DATA REPAIR ENGINE: Re-maps the Clan Name perfectly ---
                    if (currentRosterData.teams && Array.isArray(currentRosterData.teams)) {
                        currentRosterData.teams.forEach(t => {
                            let rawClan = t.clan_name || t.clan || "Unknown"; 
                            
                            // It's a JSON string
                            if (typeof rawClan === 'string' && rawClan.trim().startsWith('{')) {
                                try {
                                    let parsed = JSON.parse(rawClan);
                                    let isSquad = Array.isArray(parsed.roster) || Array.isArray(parsed.players);
                                    
                                    if (isSquad) {
                                        t.clan_name = parsed.clanName || parsed.clan_name || parsed.name || parsed.username || "Team";
                                        t.roster = parsed.roster || parsed.players || [];
                                    } else {
                                        t.clan_name = (parsed.username || parsed.name || parsed.ign || "Player") + " (Solo)";
                                        t.roster = [parsed]; 
                                    }
                                } catch(e) {
                                    t.clan_name = rawClan;
                                }
                            } 
                            // It's already a JS Object
                            else if (typeof rawClan === 'object' && rawClan !== null) {
                                let isSquad = Array.isArray(rawClan.roster) || Array.isArray(rawClan.players);
                                if (isSquad) {
                                    t.clan_name = rawClan.clanName || rawClan.clan_name || rawClan.name || rawClan.username || "Team";
                                    t.roster = rawClan.roster || rawClan.players || [];
                                } else {
                                    t.clan_name = (rawClan.username || rawClan.name || rawClan.ign || "Player") + " (Solo)";
                                    t.roster = [rawClan];
                                }
                            } 
                            // It's a normal string
                            else {
                                t.clan_name = String(rawClan);
                                if (typeof t.roster === 'string' && t.roster.trim().startsWith('[')) {
                                    try { t.roster = JSON.parse(t.roster); } catch(e) { t.roster = []; }
                                }
                            }
                            
                            // Failsafe fallback
                            if (!t.roster || !Array.isArray(t.roster)) t.roster = [];
                        });
                    }
                    
                    // NEW DYNAMIC GROUPS LOGIC: Extract custom sub-lobbies from rooms_json
                    customGroupNames = [];
                    if (currentRosterData.rooms_json && currentRosterData.rooms_json !== "{}" && currentRosterData.rooms_json !== "") {
                        try {
                            let roomsObj = JSON.parse(currentRosterData.rooms_json);
                            customGroupNames = Object.keys(roomsObj);
                        } catch(e) {}
                    }
                    
                    // Fallback if no custom lobbies were created in profile yet
                    if (customGroupNames.length === 0) {
                        customGroupNames = ['Group A', 'Group B', 'Group C', 'Group D'];
                    }

                    document.getElementById('detectedLobbiesCount').innerText = customGroupNames.length;

                    // Check if groups are already assigned to any team
                    let hasGroups = currentRosterData.teams.some(t => t.group && t.group !== "Unassigned");
                    
                    setTimeout(() => {
                        loader.style.display = 'none';
                        document.getElementById('stepFetch').style.display = 'none';
                        
                        if (hasGroups) {
                            showToast("Roster Loaded. Ready to Export.");
                            document.getElementById('stepDownload').style.display = 'block';
                        } else {
                            showToast("Roster Loaded. Please seed groups.");
                            renderGroupDropdowns();
                            document.getElementById('stepGroups').style.display = 'block';
                        }
                    }, 500);
                } else {
                    showToast('🛑 Access Denied: ' + result.data, true);
                    loader.style.display = 'none';
                }
            } catch (error) {
                showToast('❌ Server Error. Please check your connection.', true);
                loader.style.display = 'none';
            }
        }

        // --- STEP 2: DYNAMIC GROUP SEEDING LOGIC ---
        function renderGroupDropdowns() {
            let html = "";

            currentRosterData.teams.forEach((t, i) => {
                let optionsHtml = `<option value="Unassigned">Unassigned</option>`;
                
                customGroupNames.forEach(g => {
                    let sel = (t.group === g) ? "selected" : "";
                    optionsHtml += `<option value="${g}" ${sel}>${g}</option>`;
                });

                html += `
                    <div class="seed-card">
                        <div class="seed-name">${i+1}. ${t.clan_name}</div>
                        <select class="seed-select" id="seed_team_${i}">
                            ${optionsHtml}
                        </select>
                    </div>
                `;
            });
            document.getElementById('teamSeedingList').innerHTML = html;
        }

        function autoGenerateGroups() {
            triggerHaptic();
            
            // Shuffle teams visually (frontend array)
            let indices = Array.from(Array(currentRosterData.teams.length).keys());
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }

            // Assign sequentially across custom group names
            indices.forEach((teamIndex, loopIndex) => {
                let groupAssigned = customGroupNames[loopIndex % customGroupNames.length];
                currentRosterData.teams[teamIndex].group = groupAssigned;
                document.getElementById(`seed_team_${teamIndex}`).value = groupAssigned;
            });
            showToast("Magic Seed Applied! ✨");
        }

        // --- SECURE FREEZE-FREE BACKGROUND SAVE ---
        async function saveGroups() {
            triggerHaptic();
            const loader = document.getElementById('mainLoader');
            const lText = document.getElementById('loaderText');
            
            // 1. Save selections LOCALLY (This is the only data the PDF actually needs!)
            currentRosterData.teams.forEach((t, i) => {
                let selectEl = document.getElementById(`seed_team_${i}`);
                if(selectEl) t.group = selectEl.value;
            });

            loader.style.display = 'flex';
            lText.innerText = 'LOCKING BRACKETS...';

            // 2. Attempt a silent background save
            try {
                const payload = { 
                    action: 'save_roster_groups', 
                    match_id: currentRosterData.match_id, 
                    email: document.getElementById('email').value.trim(),
                    teams: currentRosterData.teams 
                };
                secureFetch(payload).catch(e => console.log("Silent backend skip."));
            } catch (error) {}

            // 3. Immediately proceed to the Download Step
            setTimeout(() => {
                loader.style.display = 'none';
                document.getElementById('stepGroups').style.display = 'none';
                document.getElementById('stepDownload').style.display = 'block';
                showToast("Groups Locked! Ready for Download. ✨");
            }, 800);
        }

        function editGroupsAgain() {
            document.getElementById('stepDownload').style.display = 'none';
            document.getElementById('stepGroups').style.display = 'block';
            renderGroupDropdowns();
        }

        // --- STEP 3: GENERATORS ---
        function executeDownload() {
            const loader = document.getElementById('mainLoader');
            loader.style.display = 'flex';
            document.getElementById('loaderText').innerText = 'GENERATING FILE...';
            
            // Allow DOM to update loader before intense generation
            setTimeout(() => {
                if (selectedFormat === 'pdf') generatePDF(currentRosterData, currentRosterData.match_id);
                else if (selectedFormat === 'word') generateWord(currentRosterData, currentRosterData.match_id);
                else if (selectedFormat === 'txt') generateText(currentRosterData, currentRosterData.match_id);

                showToast(`✨ Success! Your ${selectedFormat.toUpperCase()} is downloading.`);
                loader.style.display = 'none';
            }, 300);
        }

        function populateTemplate(data) {
            document.getElementById('docTitle').innerText = data.tournament_title;
            document.getElementById('docMeta').innerText = `Match ID: ${data.match_id}  |  Total Teams: ${data.total_teams}`;
            
            // Sort by Custom Group Names first, then alphabetically by clan name
            let sortedTeams = [...data.teams].sort((a,b) => {
                let gA = a.group || "Unassigned"; let gB = b.group || "Unassigned";
                if (gA !== gB) return gA.localeCompare(gB);
                return (a.clan_name || "").localeCompare(b.clan_name || "");
            });

            let html = '';
            sortedTeams.forEach((team, i) => {
                let groupTag = (team.group && team.group !== "Unassigned") ? `<span class="pdf-group-tag">${team.group}</span>` : "";
                
                html += `<div class="pdf-team-box">`;
                html += `<div class="pdf-team-head"><span>Slot ${i+1} - ${team.clan_name}</span> ${groupTag}</div>`;
                html += `<table class="pdf-table">`;
                html += `<tr><th>Player</th><th>Role</th><th>IGN</th><th>UID</th><th>Phone</th><th>Location</th></tr>`;
                
                if (team.roster && team.roster.length > 0) {
                    team.roster.forEach(p => {
                        let loc = (p.city && p.state) ? `${p.city}, ${p.state}` : (p.state || p.city || 'N/A');
                        let pRole = p.pos || p.role || p.player_role || 'Player';
                        let ign = p.gameName || p.ign || p.name || 'N/A';
                        let playerName = p.name || p.username || 'Player';
                        
                        html += `<tr>
                                    <td style="font-weight:bold;">${playerName}</td>
                                    <td class="role-col">${pRole}</td>
                                    <td>${ign}</td>
                                    <td style="font-family: monospace;">${p.uid || p.id || 'N/A'}</td>
                                    <td>${p.phone || 'N/A'}</td>
                                    <td>${loc}</td>
                                 </tr>`;
                    });
                } else {
                    html += `<tr><td colspan="6" style="text-align:center; color:#888; padding:15px;">No player data found for this team.</td></tr>`;
                }
                html += `</table></div>`;
            });
            document.getElementById('docContent').innerHTML = html;
        }

        function generatePDF(data, matchId) {
            populateTemplate(data);
            
            // Remove the 0 height restriction so html2canvas can 'see' the element 
            // but keep it hidden from the user using opacity 0 and negative z-index
            const wrapper = document.getElementById('pdfRenderWrapper');
            wrapper.style.height = 'auto'; 
            wrapper.style.overflow = 'visible';
            
            const element = document.getElementById('docTemplate');
            
            html2pdf().set({
                margin: [10, 10, 10, 10], // Margins
                filename: `Tournyx_${matchId}_Roster.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff', windowWidth: 800 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(element).save().then(() => {
                // Restore wrapper state
                wrapper.style.height = '0';
                wrapper.style.overflow = 'hidden';
            });
        }

        function generateWord(data, matchId) {
            populateTemplate(data);
            const content = document.getElementById('docTemplate').innerHTML;
            
            const blob = new Blob(['\ufeff', `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'></head><body>${content}</body></html>
            `], { type: 'application/msword' });
            
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Tournyx_${matchId}_Roster.doc`;
            link.click();
        }

        function generateText(data, matchId) {
            let text = `=======================================\n`;
            text += `🏆 TOURNYX ROSTER: ${data.tournament_title}\nMatch ID: ${data.match_id}\nTotal Teams: ${data.total_teams}\n`;
            text += `=======================================\n\n`;
            
            let sortedTeams = [...data.teams].sort((a,b) => {
                let gA = a.group || "Unassigned"; let gB = b.group || "Unassigned";
                if (gA !== gB) return gA.localeCompare(gB);
                return (a.clan_name || "").localeCompare(b.clan_name || "");
            });

            sortedTeams.forEach((team, i) => {
                text += `---------------------------------------\n`;
                let groupTag = (team.group && team.group !== "Unassigned") ? `[${team.group}]` : "";
                text += `[ SLOT ${i+1} ] - ${team.clan_name} ${groupTag}\n`;
                text += `---------------------------------------\n`;
                if (team.roster && team.roster.length > 0) {
                    team.roster.forEach(p => {
                        let loc = (p.city && p.state) ? `${p.city}, ${p.state}` : (p.state || p.city || 'N/A');
                        let pRole = p.pos || p.role || p.player_role || 'Player';
                        let ign = p.gameName || p.ign || p.name || 'N/A';
                        let playerName = p.name || p.username || 'Player';
                        text += `* ${playerName} (${pRole}) | IGN: ${ign} | UID: ${p.uid || p.id || 'N/A'} | Ph: ${p.phone || 'N/A'} | Loc: ${loc}\n`;
                    });
                } else {
                    text += `* No player data found.\n`;
                }
                text += `\n`;
            });

            const blob = new Blob([text], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Tournyx_${matchId}_Roster.txt`;
            link.click();
        }
    </script>
</body>
</html>
